document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

name).join(\" and \")}.` : false,\n      noteText: s.noteText,\n      onNoteText: e => this.setState({ noteText: e.target.value }),\n      onAddNote: () => {\n        if (!s.noteText.trim()) return;\n        const note = { text: s.noteText, timestamp: new Date().toISOString() };\n        this.setNotes(n => ({ ...n, [p.id]: [...(n[p.id] || []), note] }));\n        this.setState({ noteText: \"\" });\n      },\n      dNotesEmpty: noteList.length === 0,\n      dNoteList: noteList,\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const eliteThreshold = this.props.eliteThreshold ?? 80;\n    const pageSize = this.props.pageSize ?? 20;\n    const vals = {\n      isLoading: s.loadState === \"loading\",\n      isError: s.loadState === \"error\",\n      isLoaded: s.loadState === \"loaded\",\n      onRetry: () => this.fetchPlayers(),\n      playerCount: s.players.length,\n      isBoard: s.view === \"board\", isPipeline: s.view === \"pipeline\", isConferences: s.view === \"conferences\",\n      navItems: [[\"board\", \"THE BOARD\"], [\"pipeline\", `PIPELINE (${Object.keys(s.pipeline).length})`], [\"conferences\", \"CONFERENCES\"]].map(([v, label]) => ({\n        label, onClick: () => this.setState({ view: v }),\n        bg: s.view === v ? \"rgba(232,252,75,.08)\" : \"transparent\",\n        underline: s.view === v ? \"#e8fc4b\" : \"transparent\",\n        color: s.view === v ? \"#e8fc4b\" : \"#8a938f\",\n      })),\n      onHelpOpen: () => this.setState({ helpOpen: true }),\n      onHelpClose: () => this.setState({ helpOpen: false }),\n      onHelpBackdrop: e => { if (e.target === e.currentTarget) this.setState({ helpOpen: false }); },\n      helpOpen: s.helpOpen,\n      onCmdOpen: () => this.setState({ cmdOpen: true }),\n      onCmdBackdrop: e => { if (e.target === e.currentTarget) this.setState({ cmdOpen: false }); },\n      cmdOpen: s.cmdOpen, cmdQ: s.cmdQ,\n      onCmdQ: e => this.setState({ cmdQ: e.target.value }),\n      helpItems: [\n        [\"GEM SCORE (0–100)\", \"The hidden-value score. Combines projected D1 production, conference strength, age, and trend. 80+ = elite D1 starter or draft prospect. 65–79 = mid-major starter. 45–64 = roster depth.\"],\n        [\"RISK SCORE (0–100)\", \"Projection uncertainty. Lower = more reliable. Factors: small sample (<150 PA = +15), high K% (+10), age 22+ (+8), weak conference (+8). Capped at 72.\"],\n        [\"JUCO STAT\", \"Raw statistic from the player's most recent JUCO season. Hitters: OPS. Pitchers: WHIP.\"],\n        [\"PROJECTED STAT\", \"Expected performance at the selected D1 conference. Updates live when you change the dropdown.\"],\n        [\"RISING FLAG\", \"Strong positive year-over-year trend (>+.080 OPS or ERA drop).\"],\n        [\"⚗ SMALL SAMPLE\", \"< 75 PA (hitters) or < 20 IP (pitchers). Projections are less reliable with limited data.\"],\n        [\"STATUS BADGES\", \"Available = no commitment. Committed = verbal or signed NLI. Drafted = pro.\"],\n        [\"PIPELINE\", \"Star (★) any player to track them. Set stages and priority stars in the Pipeline tab.\"],\n        [\"LOAD MORE\", \"The board shows 20 players at a time. Any filter change resets the count back to 20.\"],\n      ].map(([title, desc]) => ({ title, desc })),\n    };\n    if (s.loadState !== \"loaded\") return vals;\n\n    const filtered = this.getFiltered();\n    const available = s.players.filter(p => p.status === \"available\").length;\n    const shown = Math.min(s.visibleCount, filtered.length);\n\n    // sidebar\n    vals.search = s.search;\n    vals.onSearch = e => this.resetPage({ search: e.target.value });\n    vals.shownCountText = `${shown} of ${filtered.length} shown`;\n    const advCount = [s.confFilter.length > 0, s.minGem > 0, s.maxRisk < 100, s.ageFilter.length > 0].filter(Boolean).length;\n    vals.hasAdvFilters = advCount > 0;\n    vals.onClearAdvanced = () => this.resetPage({ confFilter: [], minGem: 0, maxRisk: 100, ageFilter: [] });\n    vals.posItems = [\"SP\", \"RP\", \"C\", \"1B\", \"2B\", \"3B\", \"SS\", \"LF\", \"CF\", \"RF\", \"DH\"].map(pos => {\n      const on = s.posFilter.includes(pos);\n      return { label: pos, onClick: () => this.resetPage({ posFilter: this.toggleIn(s.posFilter, pos) }),\n        bg: on ? \"rgba(232,252,75,.12)\" : \"#161a17\", border: on ? \"rgba(232,252,75,.45)\" : \"#232824\", color: on ? \"#e8fc4b\" : \"#8a938f\" };\n    });\n    vals.statusItems = [\n      { value: null, label: \"All players\", col: \"#8a938f\" },\n      { value: \"available\", label: \"Available\", col: \"#7ee08a\" },\n      { value: \"committed\", label: \"Committed\", col: \"#8fc7e8\" },\n      { value: \"RISING\", label: \"▲ Rising trend\", col: \"#e8fc4b\" },\n    ].map(({ value, label, col }) => {\n      const on = s.flairFilter === value;\n      return { label, onClick: () => this.resetPage({ flairFilter: on ? null : value }),\n        bg: on ? col + \"14\" : \"transparent\", border: on ? col + \"55\" : \"transparent\", color: on ? col : \"#5f665f\" };\n    });\n    vals.targetConf = s.targetConf;\n    vals.onTargetConf = e => this.resetPage({ targetConf: e.target.value });\n    vals.confTargetOpts = Object.entries(this.CONF_TARGETS).map(([key, v]) => ({ key, label: v.label }));\n    vals.confChips = this.SEED_CONFS.map(c => {\n      const on = s.confFilter.includes(c);\n      return { label: c, onClick: () => this.resetPage({ confFilter: this.toggleIn(s.confFilter, c) }),\n        bg: on ? \"rgba(232,252,75,.12)\" : \"#161a17\", border: on ? \"rgba(232,252,75,.45)\" : \"#232824\", color: on ? \"#e8fc4b\" : \"#8a938f\" };\n    });\n    vals.minGem = s.minGem;\n    vals.minGemColor = s.minGem > 0 ? this.gemColor(s.minGem) : \"#5f665f\";\n    vals.onMinGem = e => this.resetPage({ minGem: Number(e.target.value) });\n    vals.maxRisk = s.maxRisk;\n    vals.maxRiskColor = s.maxRisk < 100 ? this.riskColor(s.maxRisk) : \"#5f665f\";\n    vals.onMaxRisk = e => this.resetPage({ maxRisk: Number(e.target.value) });\n    vals.ageItems = [19, 20, 21, 22].map(a => {\n      const on = s.ageFilter.includes(a);\n      return { label: String(a), onClick: () => this.resetPage({ ageFilter: this.toggleIn(s.ageFilter, a) }),\n        bg: on ? \"rgba(143,199,232,.12)\" : \"#161a17\", border: on ? \"rgba(143,199,232,.45)\" : \"#232824\", color: on ? \"#8fc7e8\" : \"#8a938f\" };\n    });\n\n    // board header\n    vals.boardKicker = `PROJECTING TO ${(this.CONF_TARGETS[s.targetConf]?.label || s.targetConf).toUpperCase()}`;\n    vals.filteredCount = filtered.length;\n    vals.availablePct = s.players.length ? Math.round(available / s.players.length * 100) + \"%\" : \"—\";\n\n    // table columns\n    const colDefs = [\n      { label: \"#\", key: null, align: \"left\" },\n      { label: \"PLAYER\", key: \"name\", align: \"left\" },\n      { label: \"STAT\", key: \"stat\", align: \"right\" },\n      { label: `PROJ`, key: \"projStat\", align: \"right\" },\n      { label: \"GEM\", key: \"gemScore\", align: \"right\" },\n      { label: \"RISK\", key: \"riskScore\", align: \"right\" },\n      { label: \"D1%\", key: \"probs_d1\", align: \"right\" },\n      { label: \"★\", key: null, align: \"center\" },\n    ];\n    vals.boardCols = colDefs.map(c => ({\n      label: c.label + (s.sortCol === c.key ? (s.sortDir === \"desc\" ? \" ↓\" : \" ↑\") : \"\"),\n      align: c.align, cursor: c.key ? \"pointer\" : \"default\",\n      color: s.sortCol === c.key ? \"#e8fc4b\" : \"#5f665f\",\n      onClick: c.key ? () => {\n        if (s.sortCol === c.key) this.setState({ sortDir: s.sortDir === \"desc\" ? \"asc\" : \"desc\" });\n        else this.setState({ sortCol: c.key, sortDir: \"desc\" });\n      } : undefined,\n    }));\n\n    vals.noResults = filtered.length === 0;\n    vals.boardRows = filtered.slice(0, s.visibleCount).map((p, i) => {\n      const isERA = p.isPitcher;\n      const mainStat = this.getMainStat(p);\n      const proj = this.projectToConf(p, s.targetConf);\n      const projStat = isERA ? proj.whip : proj.ops;\n      const lp = this.computeProbs(p);\n      const chip = this.statusChip(p.status);\n      const av = this.avatarStyle(p.name);\n      const isElite = p.gemScore >= eliteThreshold;\n      const statColor = mainStat != null ? (isERA ? (mainStat < 0.95 ? \"#e8fc4b\" : mainStat < 1.15 ? \"#c0a8e8\" : \"#c9cec7\") : (mainStat > 1.0 ? \"#e8fc4b\" : mainStat > 0.900 ? \"#c0a8e8\" : \"#c9cec7\")) : \"#c9cec7\";\n      return {\n        rank: i + 1,\n        onSelect: () => this.setState({ selected: s.selected === p.id ? null : p.id, drawerTab: \"overview\", noteText: \"\" }),\n        eliteBorder: isElite ? \"rgba(232,252,75,.6)\" : \"transparent\",\n        rowBg: s.selected === p.id ? \"rgba(232,252,75,.06)\" : isElite ? \"rgba(232,252,75,.02)\" : \"transparent\",\n        ...av, initials: this.initials(p.name),\n        name: p.name,\n        smallSample: isERA ? (p.jucoP?.ip || 0) < 20 : (p.juco?.pa || 0) < 75,\n        sampleTitle: isERA ? \"< 20 IP\" : \"< 75 PA\",\n        flag: p.flag || false, flagBg: \"rgba(232,252,75,.12)\", flagFg: \"#e8fc4b\",\n        statusLabel: (p.status || \"\").toUpperCase(), statusBg: chip.statusBg, statusFg: chip.statusFg,\n        meta: [p.pos, p.school, p.conf].filter(Boolean).join(\" · \"),\n        destText: (p.status === \"committed\" || p.status === \"drafted\") && p.dest ? `→ ${p.dest}` : \"\",\n        destColor: p.status === \"drafted\" ? \"#c0a8e8\" : \"#7ee08a\",\n        stat: mainStat != null ? (isERA ? this.fmt2(mainStat) : this.fmt3(mainStat)) : \"—\",\n        statLabel: isERA ? \"WHIP\" : \"OPS\", statColor,\n        proj: projStat != null ? (isERA ? this.fmt2(projStat) : this.fmt3(projStat)) : \"—\",\n        gem: p.gemScore, gemColor: this.gemColor(p.gemScore), gemWidth: p.gemScore + \"%\",\n        risk: p.riskScore, riskColor: this.riskColor(p.riskScore), riskLabel: this.riskLabel(p.riskScore),\n        d1Prob: ((isERA ? lp.d1IP : lp.d1PA) || 0) + \"%\",\n        starColor: s.pipeline[p.id] ? \"#e8fc4b\" : \"#2f352f\",\n        onStar: e => { e.stopPropagation(); this.togglePipeline(p.id); },\n      };\n    });\n    vals.hasMore = filtered.length > s.visibleCount;\n    vals.loadMoreText = `Showing ${shown} of ${filtered.length} · ${filtered.length - shown} more`;\n    vals.onLoadMore = () => this.setState({ visibleCount: s.visibleCount + pageSize });\n    vals.allShownNote = filtered.length <= s.visibleCount && s.visibleCount > 20;\n    vals.allShownText = `All ${filtered.length} players shown`;\n\n    // drawer\n    const selPlayer = s.selected != null ? s.players.find(p => p.id === s.selected) : null;\n    vals.hasSelected = !!selPlayer;\n    vals.onCloseDrawer = () => this.setState({ selected: null });\n    if (selPlayer) Object.assign(vals, this.buildDrawer(selPlayer));\n\n    // pipeline\n    vals.pipelineCount = Object.keys(s.pipeline).length;\n    vals.stageOpts = this.STAGES.map(st => ({ key: st.key, label: st.label.charAt(0) + st.label.slice(1).toLowerCase() }));\n    vals.stageCols = this.STAGES.map(stage => {\n      const cards = Object.entries(s.pipeline)\n        .filter(([, v]) => v.stage === stage.key)\n        .map(([id, meta]) => ({ id: Number(id), meta, player: s.players.find(p => p.id === Number(id)) }))\n        .filter(x => x.player)\n        .sort((a, b) => (b.meta.priority || 0) - (a.meta.priority || 0) || (b.player.gemScore - a.player.gemScore));\n      return {\n        label: stage.label, color: stage.color, countBg: stage.color + \"22\", count: cards.length, empty: cards.length === 0,\n        cards: cards.map(({ id, meta, player: p }) => {\n          const proj = this.projectToConf(p, s.targetConf);\n          const projStat = p.isPitcher ? proj.whip : proj.ops;\n          return {\n            onOpen: () => this.setState({ view: \"board\", selected: id, drawerTab: \"overview\" }),\n            ...this.avatarStyle(p.name), initials: this.initials(p.name),\n            name: p.name, meta: [p.pos, p.school].filter(Boolean).join(\" · \"),\n            onRemove: e => { e.stopPropagation(); this.setPipeline(pl => { const n = { ...pl }; delete n[id]; return n; }); },\n            dest: p.dest || false,\n            gem: p.gemScore, gemColor: this.gemColor(p.gemScore),\n            projText: `${projStat != null ? (p.isPitcher ? this.fmt2(projStat) : this.fmt3(projStat)) : \"—\"} ${s.targetConf}`,\n            stars: [1, 2, 3].map(n => ({\n              color: n <= (meta.priority || 0) ? \"#e8fc4b\" : \"#2f352f\",\n              onClick: e => { e.stopPropagation(); this.setPipeline(pl => ({ ...pl, [id]: { ...pl[id], priority: n === (meta.priority || 0) ? 0 : n } })); },\n            })),\n            stage: meta.stage,\n            onStage: e => { e.stopPropagation(); const v = e.target.value; this.setPipeline(pl => ({ ...pl, [id]: { ...pl[id], stage: v } })); },\n            stopClick: e => e.stopPropagation(),\n          };\n        }),\n      };\n    });\n\n    // conferences\n    vals.calcJucoConf = s.calcJucoConf;\n    vals.onCalcJucoConf = e => this.setState({ calcJucoConf: e.target.value });\n    vals.calcTargetConf = s.calcTargetConf;\n    vals.onCalcTargetConf = e => this.setState({ calcTargetConf: e.target.value });\n    vals.calcJucoOps = s.calcJucoOps;\n    vals.onCalcOps = e => this.setState({ calcJucoOps: e.target.value });\n    vals.confSourceOpts = Object.keys(this.CONF_SOURCE).map(key => ({ key }));\n    const srcR = this.CONF_SOURCE[s.calcJucoConf] || 0.85;\n    const tgt = this.CONF_TARGETS[s.calcTargetConf];\n    const ops = parseFloat(s.calcJucoOps);\n    if (tgt && !isNaN(ops) && ops > 0) {\n      const norm = ops * srcR;\n      const reg = norm > 0.900 ? 0.88 - (norm - 0.900) * 0.12 : norm > 0.780 ? 0.91 : 0.94;\n      const proj = Math.round(norm * reg * tgt.opsMult / 0.828 * 1000) / 1000;\n      vals.calcValid = true; vals.calcInvalid = false;\n      vals.calcProj = this.fmt3(proj);\n      vals.calcRange = `${this.fmt3(proj - 0.062)} — ${this.fmt3(proj + 0.068)}`;\n      vals.calcDiscount = `−${Math.round((1 - proj / ops) * 100 * 10) / 10}%`;\n    } else { vals.calcValid = false; vals.calcInvalid = true; }\n    const maxMult = Math.max(...Object.values(this.CONF_TARGETS).map(c => c.opsMult));\n    vals.diffBars = Object.entries(this.CONF_TARGETS).sort((a, b) => b[1].opsMult - a[1].opsMult).map(([k, d]) => {\n      const discount = Math.round((1 - d.opsMult / maxMult) * 100);\n      return {\n        label: d.label, width: Math.round(d.opsMult / maxMult * 100) + \"%\",\n        color: d.opsMult >= 0.840 ? \"#8a938f\" : d.opsMult >= 0.800 ? \"#e6cf6a\" : \"#8fc7e8\",\n        note: discount > 0 ? `−${discount}% vs easiest` : \"Most favorable\",\n      };\n    });\n    vals.sourceBars = Object.entries(this.CONF_SOURCE).sort((a, b) => b[1] - a[1]).map(([k, r]) => ({\n      label: k, width: Math.round(r * 100) + \"%\",\n      color: r >= 0.88 ? \"#e8fc4b\" : r >= 0.82 ? \"#8fc7e8\" : \"#8a938f\",\n      note: Math.round(r * 100) + \"% strength\",\n    }));\n\n    // cmd palette\n    const cmdResults = s.cmdQ.trim() ? s.players.filter(p => p.name.toLowerCase().includes(s.cmdQ.toLowerCase()) || p.school.toLowerCase().includes(s.cmdQ.toLowerCase())).slice(0, 8) : [];\n    vals.cmdHint = s.cmdQ.trim() === \"\" || cmdResults.length === 0;\n    vals.cmdHintText = s.cmdQ.trim() === \"\" ? `Type to search ${s.players.length} players…` : \"No results.\";\n    vals.cmdResults = cmdResults.map(p => ({\n      onPick: () => this.setState({ view: \"board\", selected: p.id, drawerTab: \"overview\", cmdOpen: false, cmdQ: \"\" }),\n      ...this.avatarStyle(p.name), initials: this.initials(p.name),\n      name: p.name, meta: [p.pos, p.school].filter(Boolean).join(\" · \"), gem: p.gemScore, gemColor: this.gemColor(p.gemScore),\n    }));\n\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
