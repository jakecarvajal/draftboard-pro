// ── Similarity engine ─────────────────────────────────────────────────────────
// Score 0–100 match between a current player and a historical comp
function calcSimilarity(player, comp) {
  let score = 0, maxScore = 0;

  if (!player.isPitcher && comp.jucoOps != null) {
    const ops = player.juco?.ops || 0;
    const opsDiff = Math.abs(ops - comp.jucoOps);
    score += Math.max(0, 30 - opsDiff * 150); maxScore += 30;

    if (comp.jucoKpct != null && player.juco?.kPct != null) {
      const kDiff = Math.abs(player.juco.kPct - comp.jucoKpct);
      score += Math.max(0, 20 - kDiff * 1.2); maxScore += 20;
    }
    if (comp.jucoIso != null && player.juco?.iso != null) {
      const isoDiff = Math.abs(player.juco.iso - comp.jucoIso);
      score += Math.max(0, 15 - isoDiff * 80); maxScore += 15;
    }
  }
  if (player.isPitcher && comp.jucoEra != null) {
    const era = player.jucoP?.era || 4;
    const eraDiff = Math.abs(era - comp.jucoEra);
    score += Math.max(0, 25 - eraDiff * 10); maxScore += 25;

    if (comp.jucoK9 != null && player.jucoP?.k9 != null) {
      const k9Diff = Math.abs(player.jucoP.k9 - comp.jucoK9);
      score += Math.max(0, 20 - k9Diff * 3); maxScore += 20;
    }
    if (comp.velo != null && player.jucoP?.velo != null) {
      const veloDiff = Math.abs(player.jucoP.velo - comp.velo);
      score += Math.max(0, 15 - veloDiff * 2); maxScore += 15;
    }
  }

  // Conf match
  if (comp.conf === player.conf) { score += 12; } maxScore += 12;
  // Age match
  if (comp.age != null) {
    const ageDiff = Math.abs((player.age || 21) - comp.age);
    score += Math.max(0, 10 - ageDiff * 4); maxScore += 10;
  }
  // Pos match
  if (comp.pos === player.pos || (player.isPitcher && (comp.pos === "SP" || comp.pos === "RP"))) {
    score += 8; } maxScore += 8;

  return maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
}

function getTopComps(player, n=3) {
  const pool = player.isPitcher ? COMP_DB.pitchers : COMP_DB.hitters;
  return pool
    .map(c => ({ ...c, score: calcSimilarity(player, c) }))
    .sort((a,b) => b.score - a.score)
    .slice(0, n);
}



function projectToConf(player, targetConf) {
  const target = CONF_TARGETS[targetConf];
  const source = CONF_SOURCE[player.conf] || { rating:0.85 };
  if (!target) return player.proj;
  if (!player.isPitcher && player.juco) {
    const adjOps = player.juco.ops / 1.07;
    const projOps = Math.round(adjOps * source.rating * target.opsMult * 1000) / 1000;
    return { ...player.proj, ops:projOps, obp:Math.round(player.juco.obp*source.rating*target.opsMult*1.02*1000)/1000, slg:Math.round(player.juco.slg*source.rating*target.opsMult*0.98*1000)/1000, floor:Math.round((projOps-0.055)*1000)/1000, ceil:Math.round((projOps+0.062)*1000)/1000 };
  }
  if (player.isPitcher && player.jucoP) {
    const projEra = Math.round(player.jucoP.era*(1/source.rating)*target.eraMult*100)/100;
    return { ...player.proj, era:projEra, floor:Math.round((projEra+0.70)*100)/100, ceil:Math.round((projEra-0.52)*100)/100 };
  }
  return player.proj;
}

function useLocalStorage(key,initial){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):initial;}catch{return initial;}});
  const set=useCallback((v)=>{const next=typeof v==="function"?v(val):v;setVal(next);try{localStorage.setItem(key,JSON.stringify(next));}catch{}},[key,val]);
  return[val,set];
}

function Avatar({name,size=36}){
  const c=["#3C3489","#085041","#712B13","#0C447C","#633806"][name.charCodeAt(0)%5];
  return <div style={{width:size,height:size,borderRadius:"50%",background:c+"33",border:`1px solid ${c}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.35,fontWeight:600,color:c+"cc",flexShrink:0,fontFamily:"'DM Mono',monospace"}}>{initials(name)}</div>;
}
function Badge({text,type}){
  const[bg,col]=type==="flag"?(flagColors[text]||["rgba(255,255,255,.08)","#94a3b8"]):type==="status"?(statusColors[text]||["rgba(255,255,255,.08)","#94a3b8"]):["rgba(255,255,255,.08)","#94a3b8"];
  return <span style={{display:"inline-block",fontSize:10,fontWeight:600,letterSpacing:".06em",padding:"2px 7px",borderRadius:3,background:bg,color:col,textTransform:"uppercase",whiteSpace:"nowrap"}}>{text}</span>;
}
function ProbBar({label,value,color="#4ade80"}){
  return <div style={{marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>

      <div style={{width:`${value}%`,height:"100%",background:color,opacity:.75,borderRadius:2}}/>
    </div>
  </div>;
}

function PlayerDetail({player,targetConf,onClose,watched,onWatch,notes,onNote}){
  const[tab,setTab]=useState("overview");

  if(!player)return null;
  const p=player,proj=projectToConf(p,targetConf),mainStat=getMainStat(p),isERA=p.isPitcher;
  const projStat=isERA?proj.era:proj.ops;
  const playerNotes=notes[p.id]||[];
  return <div style={{position:"fixed",top:0,right:0,height:"100vh",width:"min(500px,100vw)",background:"#0c111b",borderLeft:"1px solid rgba(255,255,255,.08)",zIndex:100,display:"flex",flexDirection:"column",overflowY:"auto",animation:"slideInRight .2s ease"}}>

        <Badge text={p.status} type="status"/>
        {p.dest&&<span style={{fontSize:12,color:"#4ade80"}}>→ {p.dest}</span>}
        {p.flag&&<Badge text={p.flag} type="flag"/>}
        <span style={{fontSize:11,color:"#4a5568"}}>{p.school} · {p.conf} · {p.year}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[["JUCO "+getStatLabel(p),mainStat!=null?(isERA?fmt2(mainStat):fmt3(mainStat)):"—","#f6ad55"],["PROJ "+targetConf,projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—","#93c5fd"],["GEM",p.gemScore,gemColor(p.gemScore)],["RISK",`${p.riskScore} ${riskLabel(p.riskScore)}`,riskColor(p.riskScore)]].map(([l,v,c])=>(
          <div key={l} style={{...S.card,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:500,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
        {["overview","stats","projections","comps","notes"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",borderBottom:tab===t?"2px solid #f6ad55":"2px solid transparent",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,padding:"8px 12px",color:tab===t?"#f6ad55":"#718096",textTransform:"capitalize"}}>{t}</button>
        ))}
      </div>
    </div>
    <div style={{padding:"18px 24px",flex:1}}>
      {tab==="overview"&&<div>
        <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.7,marginBottom:16}}>{p.notes}</p>
        <div style={S.divider}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[["Height",p.ht],["Weight",p.wt+"lb"],["Bats/Throws",p.bats+"/"+p.throws],["Hometown",p.hometown]].map(([l,v])=>(
            <div key={l} style={{...S.card,padding:"8px 12px"}}><div style={{fontSize:10,color:"#4a5568"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#e2e8f0",marginTop:2}}>{v}</div></div>
          ))}
        </div>
        <button onClick={()=>onWatch(p.id)} style={{width:"100%",padding:"9px 0",borderRadius:6,cursor:"pointer",background:watched?"rgba(246,173,85,.15)":"rgba(255,255,255,.04)",border:`1px solid ${watched?"rgba(246,173,85,.4)":"rgba(255,255,255,.08)"}`,color:watched?"#f6ad55":"#718096",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>
          {watched?"★ Watchlisted":"☆ Add to Watchlist"}
        </button>
      </div>}
      {tab==="stats"&&<div>
        <div style={{...S.label,marginBottom:8}}>Raw {p.year} JUCO Stats</div>
        {!isERA&&p.juco?<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:14}}>
          {[["AVG",fmt3(p.juco.avg)],["OBP",fmt3(p.juco.obp)],["SLG",fmt3(p.juco.slg)],["OPS",fmt3(p.juco.ops),"#f6ad55"],["ISO",fmt3(p.juco.iso)],["BB%",p.juco.bbPct+"%"],["K%",p.juco.kPct+"%"],["PA",p.juco.pa],["HR",p.juco.hr],["SB",p.juco.sb],["2B",p.juco.doubles],["3B",p.juco.triples]].map(([l,v,c])=>(
            <div key={l} style={{...S.card,padding:"8px 10px"}}><div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,color:c||"#a5b4fc",marginTop:2}}>{v}</div></div>
          ))}
        </div>:p.jucoP?<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:14}}>
          {[["ERA",fmt2(p.jucoP.era),"#f6ad55"],["WHIP",fmt2(p.jucoP.whip)],["FIP",fmt2(p.jucoP.fip)],["K/9",p.jucoP.k9?.toFixed(1)],["BB/9",p.jucoP.bb9?.toFixed(1)],["IP",p.jucoP.ip],["Velo",p.jucoP.velo+" mph"],["GS",p.jucoP.gs],["SV",p.jucoP.sv]].map(([l,v,c])=>(
            <div key={l} style={{...S.card,padding:"8px 10px"}}><div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,color:c||"#a5b4fc",marginTop:2}}>{v}</div></div>
          ))}
        </div>:null}
        <div style={{...S.card,padding:"12px 14px"}}>
          {[["Conf-adj percentile",p.confAdj+"th","#f6ad55"],["Source conf strength",(CONF_SOURCE[p.conf]?.rating||0).toFixed(2),"#93c5fd"],["YoY trend",p.trend,p.trend?.startsWith("+")||p.trend?.startsWith("−0")&&p.isPitcher?"#4ade80":"#f87171"]].map(([l,v,c])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#94a3b8",marginBottom:6}}>
              <span>{l}</span><span style={{fontFamily:"'DM Mono',monospace",color:c}}>{v}</span>
            </div>
          ))}
        </div>
      </div>}
      {tab==="projections"&&<div>
        <div style={{...S.label}}>Projection → {CONF_TARGETS[targetConf]?.label}</div>
        <div style={{...S.card,marginBottom:14}}>
          {[["1. Raw JUCO stat",mainStat!=null?(isERA?fmt2(mainStat):fmt3(mainStat)):"—","#e2e8f0"],["2. Source conf ×"+(CONF_SOURCE[p.conf]?.rating||0.85).toFixed(2),isERA?fmt2(mainStat*(1/(CONF_SOURCE[p.conf]?.rating||0.85))):fmt3(mainStat*(CONF_SOURCE[p.conf]?.rating||0.85)),"#94a3b8"],["3. Target conf ×"+(isERA?CONF_TARGETS[targetConf]?.eraMult:CONF_TARGETS[targetConf]?.opsMult)?.toFixed(3),projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—","#93c5fd"]].map(([step,val,col])=>(
            <div key={step} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
              <span style={{fontSize:12,color:"#94a3b8"}}>{step}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500,color:col}}>{val}</span>
            </div>
          ))}
        </div>
        <div style={{...S.card,padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:12}}>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#f87171"}}>{isERA?fmt2(proj.floor):fmt3(proj.floor)} floor</span>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#93c5fd",fontWeight:600,fontSize:16}}>{projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—"}</span>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#4ade80"}}>{isERA?fmt2(proj.ceil):fmt3(proj.ceil)} ceil</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.06)",borderRadius:4,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",left:"10%",width:"80%",height:"100%",background:"rgba(147,197,253,.2)",borderRadius:4}}/>
            <div style={{position:"absolute",left:"45%",width:3,height:"100%",background:"#93c5fd",borderRadius:2}}/>
          </div>
        </div>
        <ProbBar label={`P(${isERA?"30+ IP":"100+ PA"}, yr 1)`} value={isERA?(p.probs.d1IP||0):(p.probs.d1PA||0)} color="#22c55e"/>
        <ProbBar label="P(above-avg D1 starter)" value={p.probs.avgStarter||0} color="#4ade80"/>
        <ProbBar label="P(roster retained yr 2)" value={p.probs.retained||0} color="#93c5fd"/>
        <ProbBar label="P(pro opportunity)" value={p.probs.pro||0} color="#a78bfa"/>
      </div>}
      {tab==="comps"&&<div>
        {(()=>{
          const comps=getTopComps(p,4);
          const mlbComps=comps.filter(c=>c.level==="MLB");
          const d1Comps=comps.filter(c=>c.level==="D1"||c.level==="MiLB");
          const levelColor={"D1":"#93c5fd","MiLB":"#a78bfa","MLB":"#f6ad55"};
          const levelBg={"D1":"rgba(147,197,253,.1)","MiLB":"rgba(167,139,250,.1)","MLB":"rgba(246,173,85,.12)"};
          return <div>
            <div style={{...S.label,marginBottom:4}}>Historical Comparable Players</div>
            <p style={{fontSize:11,color:"#4a5568",marginBottom:14,lineHeight:1.5}}>Matched by {p.isPitcher?"ERA, K/9, velocity":"OPS, K%, ISO"}, conference, age, and position. Similarity score 0–100.</p>
            {comps.length===0&&<p style={{fontSize:13,color:"#4a5568",fontStyle:"italic"}}>No comps found.</p>}
            {comps.map(c=>(
              <div key={c.id} style={{...S.card,marginBottom:10,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{c.name}</span>
                      <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:3,
                        background:levelBg[c.level]||"rgba(255,255,255,.06)",
                        color:levelColor[c.level]||"#94a3b8",letterSpacing:".06em"}}>{c.level}</span>
                      {c.level==="MLB"&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:3,background:"rgba(246,173,85,.08)",color:"#f6ad55"}}>⚾ MLB</span>}
                    </div>
                    <div style={{fontSize:11,color:"#4a5568"}}>{c.jucoSchool} ({c.conf||"—"}) · {c.jucoYear||"—"} · {c.pos}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:600,color:c.score>=75?"#4ade80":c.score>=55?"#f6ad55":"#94a3b8"}}>{c.score}</div>
                    <div style={{fontSize:9,color:"#4a5568",letterSpacing:".08em",textTransform:"uppercase"}}>match</div>
                  </div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  <div style={{background:"rgba(255,255,255,.03)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>JUCO Line</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#f6ad55",lineHeight:1.5}}>{c.jucoLine||"—"}</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,.03)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:levelColor[c.level]||"#94a3b8",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>{c.level} Line</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#93c5fd",lineHeight:1.5}}>{c.destLine||"—"}</div>
                  </div>
                </div>

                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:c.proPath?8:0}}>{c.outcome}</div>

                {c.proPath&&<div style={{marginTop:6,padding:"7px 10px",background:"rgba(246,173,85,.06)",borderRadius:6,border:"1px solid rgba(246,173,85,.15)"}}>
                  <div style={{fontSize:9,color:"#f6ad55",textTransform:"uppercase",letterSpacing:".08em",marginBottom:2}}>Pro Path</div>
                  <div style={{fontSize:11,color:"#e2e8f0",fontFamily:"'DM Mono',monospace"}}>{c.proPath}</div>
                </div>}

                {c.tags&&c.tags.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>
                  {c.tags.map(t=><span key={t} style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"rgba(255,255,255,.05)",color:"#4a5568",textTransform:"uppercase",letterSpacing:".06em"}}>{t}</span>)}
                </div>}
              </div>
            ))}

            {mlbComps.length>0&&<div style={{marginTop:16,padding:"12px 14px",background:"rgba(246,173,85,.04)",border:"1px solid rgba(246,173,85,.12)",borderRadius:8}}>
              <div style={{fontSize:11,fontWeight:600,color:"#f6ad55",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                ⚾ MLB Ceiling Note
              </div>
              <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,margin:0}}>
                {mlbComps.length} of your top comps reached MLB. This player{p.isPitcher?" shares a similar arm profile with":" shares hitting profile traits with"} {mlbComps.map(c=>c.name).join(" and ")}. Pro potential is real — JUCO players with this profile have gone {mlbComps.some(c=>c.tags?.includes("straight-to-pro"))?"directly to professional baseball":"through D1 to pro"}.
              </p>
            </div>}

            <div style={{...S.divider}}/>
            <div style={{fontSize:10,color:"#4a5568",lineHeight:1.6}}>
              Similarity scores are calculated from {p.isPitcher?"ERA, K/9, and velocity":"OPS, K%, and ISO"} differential, conference strength match, age, and position. Higher score = closer statistical profile to the comp player.
            </div>
          </div>;
        })()}
      </div>}

      {tab==="notes"&&<div>
        <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add scouting observations…"
          style={{width:"100%",minHeight:80,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:10,color:"#e2e8f0",fontFamily:"'DM Sans',sans-serif",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box",marginBottom:8}}/>
        <button onClick={()=>{if(!noteText.trim())return;onNote(p.id,{text:noteText,timestamp:new Date().toISOString()});setNoteText("");}}
          style={{padding:"8px 20px",background:"rgba(246,173,85,.15)",border:"1px solid rgba(246,173,85,.3)",borderRadius:6,cursor:"pointer",color:"#f6ad55",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,marginBottom:16}}>Add Note</button>
        {playerNotes.length===0?<p style={{fontSize:13,color:"#4a5568",fontStyle:"italic"}}>No notes yet.</p>
          :playerNotes.slice(0,5).map((n,i)=>(
            <div key={i} style={{...S.card,marginBottom:8}}>
              <div style={{fontSize:10,color:"#4a5568",marginBottom:4}}>{new Date(n.timestamp).toLocaleDateString()}</div>
              <p style={{fontSize:12,color:"#94a3b8",margin:0,lineHeight:1.6}}>{n.text}</p>
            </div>
          ))
        }
      </div>}
    </div>
  </div>;
}

const SORT_OPTIONS=[{value:"gemScore",label:"Gem Score"},{value:"riskScore",label:"Risk Score"},{value:"confAdj",label:"Conf Adj Pct"},{value:"age",label:"Age"},{value:"name",label:"Name (A–Z)"},{value:"stat",label:"JUCO Stat"},{value:"projStat",label:"Projected Stat"},{value:"probs_d1",label:"D1 Playing Time Prob"}];

function App(){
  const[players,setPlayers]=useState(PLAYERS);
  const[dataSource,setDataSource]=useState("demo");
  const[search,setSearch]=useState("");
  const[targetConf,setTargetConf]=useState("C-USA");
  const[sortCol,setSortCol]=useState("gemScore");
  const[sortDir,setSortDir]=useState("desc");
  const[selected,setSelected]=useState(null);
  const[view,setView]=useState("board");
  const[posFilter,setPosFilter]=useState([]);
  const[cmdOpen,setCmdOpen]=useState(false);
  const[cmdQ,setCmdQ]=useState("");
  const[watchlist,setWatchlist]=useLocalStorage("dbp_wl26",[]);
  const[notes,setNotes]=useLocalStorage("dbp_notes26",{});
  const[settings]=useLocalStorage("dbp_settings26",{headCoach:""});

  useEffect(()=>{
    if(!SHEETDB_URL.includes("REPLACE_WITH_YOUR_ID")){
      fetch(SHEETDB_URL).then(r=>r.json()).then(rows=>{setPlayers(rows.map(parsePlayer));setDataSource("live");}).catch(()=>{});
    }
  },[]);

  useEffect(()=>{
    const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmdOpen(o=>!o);}if(e.key==="Escape"){setSelected(null);setCmdOpen(false);}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);

  const onWatch=(id)=>setWatchlist(w=>w.includes(id)?w.filter(x=>x!==id):[...w,id]);
  const onNote=(pid,note)=>setNotes(n=>({...n,[pid]:[...(n[pid]||[]),note]}));

  const filtered=useMemo(()=>{
    let p=[...players];
    if(search){const q=search.toLowerCase();p=p.filter(x=>x.name.toLowerCase().includes(q)||x.school.toLowerCase().includes(q)||x.pos.toLowerCase().includes(q));}
    if(posFilter.length)p=p.filter(x=>posFilter.includes(x.pos));
    p.sort((a,b)=>{
      let va,vb;
      if(sortCol==="stat"){va=getMainStat(a)??-99;vb=getMainStat(b)??-99;}
      else if(sortCol==="projStat"){const pa=projectToConf(a,targetConf),pb=projectToConf(b,targetConf);va=(a.isPitcher?pa.era:pa.ops)??-99;vb=(b.isPitcher?pb.era:pb.ops)??-99;}
      else if(sortCol==="probs_d1"){va=(a.isPitcher?a.probs.d1IP:a.probs.d1PA)??0;vb=(b.isPitcher?b.probs.d1IP:b.probs.d1PA)??0;}
      else if(sortCol==="name"){return sortDir==="asc"?a.name.localeCompare(b.name):b.name.localeCompare(a.name);}
      else{va=a[sortCol]??-99;vb=b[sortCol]??-99;}
      return(va-vb)*(sortDir==="desc"?-1:1);
    });
    return p;
  },[players,search,posFilter,sortCol,sortDir,targetConf]);

  const selPlayer=useMemo(()=>selected?players.find(p=>p.id===selected):null,[selected,players]);
  const cmdResults=useMemo(()=>{if(!cmdQ.trim())return[];const q=cmdQ.toLowerCase();return players.filter(p=>p.name.toLowerCase().includes(q)||p.school.toLowerCase().includes(q)).slice(0,8);},[cmdQ,players]);

  return <div style={{minHeight:"100vh",background:"#0c111b",color:"#e2e8f0",fontFamily:"'DM Sans','Helvetica Neue',sans-serif",display:"flex",flexDirection:"column"}}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>

    <nav style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",height:52,borderBottom:"1px solid rgba(255,255,255,.07)",background:"#0a0f1a",position:"sticky",top:0,zIndex:10,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:"#f6ad55"}}>DRAFTBOARD<span style={{color:"#4a5568",marginLeft:2}}>PRO</span></div>
        <div style={{width:1,height:20,background:"rgba(255,255,255,.08)"}}/>
        {["board","watchlist","conferences"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{background:view===v?"rgba(246,173,85,.08)":"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,padding:"6px 10px",borderRadius:4,color:view===v?"#f6ad55":"#718096"}}>
            {v==="board"?"Scout Board":v==="watchlist"?`Watchlist (${watchlist.length})`:"Conferences"}
          </button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:dataSource==="live"?"#4ade80":"#f6ad55"}}>● {dataSource==="live"?"LIVE":"DEMO"}</span>
        <button onClick={()=>setCmdOpen(true)} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,cursor:"pointer",color:"#718096",fontFamily:"'DM Mono',monospace",fontSize:11,padding:"4px 10px"}}>⌘K</button>
        <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#f6ad55,#ed8936)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#0c111b",fontFamily:"'DM Mono',monospace"}}>
          {(settings.headCoach||"C").charAt(0).toUpperCase()}
        </div>
      </div>
    </nav>

    <main style={{display:"flex",flex:1,overflow:"hidden"}}>

      {view==="board"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* TOOLBAR */}
        <div style={{padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:8,background:"#0c111b",flexShrink:0,flexWrap:"wrap"}}>
          <input type="search" placeholder="Search player or school…" value={search} onChange={e=>setSearch(e.target.value)} style={{...S.sel,width:180}}/>

          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {["SP","RP","C","1B","2B","3B","SS","LF","CF","RF"].map(pos=>(
              <button key={pos} onClick={()=>setPosFilter(f=>f.includes(pos)?f.filter(x=>x!==pos):[...f,pos])}
                style={{padding:"3px 7px",borderRadius:3,fontSize:11,fontWeight:600,cursor:"pointer",background:posFilter.includes(pos)?"rgba(246,173,85,.15)":"rgba(255,255,255,.04)",border:posFilter.includes(pos)?"1px solid rgba(246,173,85,.4)":"1px solid rgba(255,255,255,.08)",color:posFilter.includes(pos)?"#f6ad55":"#718096",fontFamily:"'DM Mono',monospace"}}>
                {pos}
              </button>
            ))}
          </div>

          <div style={{width:1,height:20,background:"rgba(255,255,255,.08)",flexShrink:0}}/>

          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10,color:"#4a5568",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",whiteSpace:"nowrap"}}>Project to</span>
            <select value={targetConf} onChange={e=>setTargetConf(e.target.value)} style={{...S.sel,width:148}}>
              {Object.entries(CONF_TARGETS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>

          <div style={{width:1,height:20,background:"rgba(255,255,255,.08)",flexShrink:0}}/>

          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10,color:"#4a5568",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",whiteSpace:"nowrap"}}>Sort by</span>
            <select value={sortCol} onChange={e=>setSortCol(e.target.value)} style={{...S.sel,width:155}}>
              {SORT_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
            <button onClick={()=>setSortDir(d=>d==="desc"?"asc":"desc")}
              style={{padding:"5px 9px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,cursor:"pointer",color:"#94a3b8",fontFamily:"'DM Mono',monospace",fontSize:12}}>
              {sortDir==="desc"?"↓":"↑"}
            </button>
          </div>

          <span style={{fontSize:11,color:"#4a5568",marginLeft:"auto",whiteSpace:"nowrap"}}>{filtered.length} / {players.length}</span>
        </div>

        {/* TABLE */}
        <div style={{overflowY:"auto",flex:1,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:560}}>
            <thead>
              <tr style={{background:"#0f1623",position:"sticky",top:0,zIndex:2}}>
                {[{l:"Player",a:"left",w:220},{l:"JUCO Stat",a:"right",w:82},{l:`Proj (${targetConf})`,a:"right",w:100},{l:"Gem",a:"right",w:78},{l:"Risk",a:"right",w:78},{l:"D1 Prob",a:"right",w:72},{l:"★",a:"center",w:44}].map(h=>(
                  <th key={h.l} scope="col" style={{padding:"0 8px 8px",fontSize:10,fontWeight:600,letterSpacing:".08em",color:"#4a5568",textTransform:"uppercase",textAlign:h.a,whiteSpace:"nowrap",minWidth:h.w}}>{h.l}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan={7} style={{padding:"40px",textAlign:"center",fontSize:14,color:"#4a5568"}}>No players match your filters.</td></tr>
                :filtered.map(p=>{
                  const mainStat=getMainStat(p),proj=projectToConf(p,targetConf),projStat=p.isPitcher?proj.era:proj.ops,isERA=p.isPitcher;
                  const statColor=mainStat!=null?(isERA?(mainStat<2.5?"#f6ad55":mainStat<3.5?"#a78bfa":"#e2e8f0"):(mainStat>1.0?"#f6ad55":mainStat>.900?"#a78bfa":"#e2e8f0")):"#e2e8f0";
                  const d1Prob=isERA?(p.probs.d1IP||0):(p.probs.d1PA||0);
                  return <tr key={p.id} onClick={()=>setSelected(selected===p.id?null:p.id)} tabIndex={0} onKeyDown={e=>(e.key==="Enter"||e.key===" ")&&setSelected(selected===p.id?null:p.id)}
                    style={{borderBottom:"1px solid rgba(255,255,255,.04)",cursor:"pointer",background:selected===p.id?"rgba(246,173,85,.06)":"transparent",transition:"background .1s"}}>
                    <td style={{padding:"9px 8px",minWidth:220}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={p.name} size={28}/>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                            <span style={{fontSize:13,fontWeight:500,color:"#e2e8f0"}}>{p.name}</span>
                            {p.flag&&<Badge text={p.flag} type="flag"/>}
                            <Badge text={p.status} type="status"/>
                          </div>
                          <div style={{fontSize:11,color:"#4a5568",marginTop:1}}>{p.pos} · {p.school} · {p.conf}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"9px 8px",textAlign:"right"}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:500,color:statColor}}>{mainStat!=null?(isERA?fmt2(mainStat):fmt3(mainStat)):"—"}</span>
                      <div style={{fontSize:10,color:"#4a5568"}}>{isERA?"ERA":"OPS"}</div>
                    </td>
                    <td style={{padding:"9px 8px",textAlign:"right"}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:500,color:"#93c5fd"}}>{projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—"}</span>
                      <div style={{fontSize:10,color:"#4a5568"}}>{targetConf}</div>
                    </td>
                    <td style={{padding:"9px 8px",textAlign:"right"}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:500,color:gemColor(p.gemScore)}}>{p.gemScore}</span>
                      <div style={{height:3,borderRadius:2,background:"rgba(255,255,255,.08)",overflow:"hidden",marginTop:3,width:44,marginLeft:"auto"}}>
                        <div style={{width:`${p.gemScore}%`,height:"100%",background:gemColor(p.gemScore)}}/>
                      </div>
                    </td>
                    <td style={{padding:"9px 8px",textAlign:"right"}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:riskColor(p.riskScore)}}>{p.riskScore}</span>
                      <div style={{fontSize:10,color:riskColor(p.riskScore),opacity:.7}}>{riskLabel(p.riskScore)}</div>
                    </td>
                    <td style={{padding:"9px 8px",textAlign:"right"}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8"}}>{d1Prob}%</span>
                    </td>
                    <td style={{padding:"9px 8px",textAlign:"center",width:44}}>
                      <button onClick={e=>{e.stopPropagation();onWatch(p.id);}} aria-label={(watchlist.includes(p.id)?"Remove ":"Add ")+p.name}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:watchlist.includes(p.id)?"#f6ad55":"#2d3748",minWidth:44,minHeight:44,display:"flex",alignItems:"center",justifyContent:"center"}}>★</button>
                    </td>
                  </tr>;
                })
              }
            </tbody>
          </table>
        </div>
      </div>}

      {view==="watchlist"&&<div style={{padding:"24px 28px",overflowY:"auto",flex:1}}>
        <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,color:"#e2e8f0",margin:"0 0 16px"}}>WATCHLIST</h1>
        {watchlist.length===0?<p style={{fontSize:14,color:"#4a5568"}}>Your watchlist is empty. Star players on the Scout Board to track them here.</p>
          :watchlist.map(id=>{const p=players.find(x=>x.id===id);if(!p)return null;
            const proj=projectToConf(p,targetConf),projStat=p.isPitcher?proj.era:proj.ops;
            return <div key={id} onClick={()=>{setSelected(id);setView("board");}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:6,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:8,cursor:"pointer"}}>
              <Avatar name={p.name} size={32}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:"#e2e8f0"}}>{p.name}</div><div style={{fontSize:11,color:"#4a5568"}}>{p.pos} · {p.school} · {p.conf}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#93c5fd"}}>{projStat!=null?(p.isPitcher?fmt2(projStat):fmt3(projStat)):"—"}</div><div style={{fontSize:10,color:"#4a5568"}}>{targetConf}</div></div>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:gemColor(p.gemScore),minWidth:28}}>{p.gemScore}</span>
              <Badge text={p.status} type="status"/>
              <button onClick={e=>{e.stopPropagation();onWatch(id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#4a5568",fontSize:18,minWidth:44,minHeight:44,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>;
          })
        }
      </div>}

      {view==="conferences"&&<div style={{padding:"24px 28px",overflowY:"auto",flex:1}}>
        <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,color:"#e2e8f0",margin:"0 0 6px"}}>CONFERENCE TRANSLATION ENGINE</h1>
        <p style={{fontSize:12,color:"#4a5568",margin:"0 0 20px"}}>OPS and ERA multipliers from JUCO source conference → D1 target conference</p>
        <div style={{...S.card,marginBottom:18}}>
          <div style={{...S.label}}>Source Conferences (JUCO)</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,.08)"}}>
              {["Conference","Strength","Transfers","D1 Success"].map(h=><th key={h} scope="col" style={{fontSize:10,fontWeight:600,letterSpacing:".08em",color:"#4a5568",textTransform:"uppercase",padding:"0 8px 8px",textAlign:h==="Conference"?"left":"right"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {Object.entries(CONF_SOURCE).sort((a,b)=>b[1].rating-a[1].rating).map(([conf,d])=>(
                <tr key={conf} style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                  <td style={{padding:"10px 8px",fontSize:13,color:"#e2e8f0"}}>{conf}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:500,textAlign:"right",padding:"10px 8px",color:d.rating>=.88?"#f6ad55":d.rating>=.82?"#93c5fd":"#718096"}}>{d.rating.toFixed(2)}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:13,textAlign:"right",padding:"10px 8px",color:"#94a3b8"}}>{d.transfers}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:13,textAlign:"right",padding:"10px 8px",color:"#4ade80"}}>{d.d1Rate}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{...S.card}}>
          <div style={{...S.label}}>Target Conference Multipliers (D1)</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,.08)"}}>
              {["Conference","OPS Mult","ERA Mult","Tier"].map(h=><th key={h} scope="col" style={{fontSize:10,fontWeight:600,letterSpacing:".08em",color:"#4a5568",textTransform:"uppercase",padding:"0 8px 8px",textAlign:h==="Conference"?"left":"right"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {Object.entries(CONF_TARGETS).sort((a,b)=>b[1].opsMult-a[1].opsMult).map(([conf,d])=>(
                <tr key={conf} style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                  <td style={{padding:"10px 8px",fontSize:13,color:"#e2e8f0"}}>{d.label}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:13,textAlign:"right",padding:"10px 8px",color:"#a5b4fc"}}>{d.opsMult.toFixed(3)}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:13,textAlign:"right",padding:"10px 8px",color:"#a5b4fc"}}>{d.eraMult.toFixed(3)}</td>
                  <td style={{textAlign:"right",padding:"10px 8px"}}>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:3,background:d.opsMult>=.840?"rgba(74,222,128,.1)":d.opsMult>=.800?"rgba(246,173,85,.1)":"rgba(147,197,253,.1)",color:d.opsMult>=.840?"#4ade80":d.opsMult>=.800?"#f6ad55":"#93c5fd"}}>
                      {d.opsMult>=.840?"MID-MAJOR":d.opsMult>=.800?"HIGH MID-MAJOR":"POWER 5"}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}

      {selPlayer&&<PlayerDetail player={selPlayer} targetConf={targetConf} onClose={()=>setSelected(null)} watched={watchlist.includes(selPlayer.id)} onWatch={onWatch} notes={notes} onNote={onNote}/>}
    </main>

    {cmdOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"80px 20px"}} onClick={e=>e.target===e.currentTarget&&setCmdOpen(false)}>
      <div style={{background:"#0f1623",border:"1px solid rgba(255,255,255,.1)",borderRadius:12,width:"100%",maxWidth:520,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          <input autoFocus value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Search players…" onKeyDown={e=>e.key==="Escape"&&setCmdOpen(false)}
            style={{flex:1,background:"none",border:"none",color:"#e2e8f0",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
          <kbd style={{fontSize:11,color:"#4a5568",border:"1px solid rgba(255,255,255,.1)",borderRadius:4,padding:"2px 6px",fontFamily:"'DM Mono',monospace"}}>ESC</kbd>
        </div>
        {cmdQ.trim()===""?<p style={{padding:"20px 16px",fontSize:13,color:"#4a5568",margin:0}}>Type to search {players.length} players…</p>
          :cmdResults.length===0?<p style={{padding:"20px 16px",fontSize:13,color:"#4a5568",margin:0}}>No results.</p>
          :cmdResults.map(p=>(
            <div key={p.id} onClick={()=>{setSelected(p.id);setView("board");setCmdOpen(false);setCmdQ("");}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
              <Avatar name={p.name} size={28}/>
              <div style={{flex:1}}><div style={{fontSize:13,color:"#e2e8f0"}}>{p.name}</div><div style={{fontSize:11,color:"#4a5568"}}>{p.pos} · {p.school}</div></div>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,padding:"2px 8px",borderRadius:3,background:"rgba(255,255,255,.05)",color:gemColor(p.gemScore)}}>{p.gemScore}</span>
              <Badge text={p.status} type="status"/>
            </div>
          ))
        }
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
