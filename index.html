// ── Similarity engine ─────────────────────────────────────────────────────────
// Score 0–100 match between a current player and a historical comp
// Uses multiple weighted dimensions to prevent repeated comps
function calcSimilarity(player, comp) {
  let score = 0, maxScore = 0;

  if (!player.isPitcher) {
    const ops = player.juco?.ops || 0;
    // OPS proximity (primary weight)
    if (comp.jucoOps != null) {
      const diff = Math.abs(ops - comp.jucoOps);
      score += Math.max(0, 28 - diff * 140); maxScore += 28;
    }
    // K% proximity
    if (comp.jucoKpct != null && player.juco?.kPct != null) {
      const diff = Math.abs(player.juco.kPct - comp.jucoKpct);
      score += Math.max(0, 18 - diff * 1.1); maxScore += 18;
    }
    // ISO/power proximity
    if (comp.jucoIso != null && player.juco?.iso != null) {
      const diff = Math.abs(player.juco.iso - comp.jucoIso);
      score += Math.max(0, 14 - diff * 75); maxScore += 14;
    }
    // Speed bonus (SB-based)
    if (player.juco?.sb != null) {
      const speedTier = player.juco.sb > 20 ? 'speed' : player.juco.sb > 10 ? 'avg' : 'slow';
      const compIsSpeed = comp.tags?.includes('speed');
      if (speedTier === 'speed' && compIsSpeed) { score += 6; } maxScore += 6;
    }
  }

  if (player.isPitcher) {
    const era = player.jucoP?.era || 4;
    // ERA proximity
    if (comp.jucoEra != null) {
      const diff = Math.abs(era - comp.jucoEra);
      score += Math.max(0, 24 - diff * 9); maxScore += 24;
    }
    // K/9 proximity
    if (comp.jucoK9 != null && player.jucoP?.k9 != null) {
      const diff = Math.abs(player.jucoP.k9 - comp.jucoK9);
      score += Math.max(0, 18 - diff * 2.8); maxScore += 18;
    }
    // Velocity proximity
    if (comp.velo != null && player.jucoP?.velo != null) {
      const diff = Math.abs(player.jucoP.velo - comp.velo);
      score += Math.max(0, 14 - diff * 1.8); maxScore += 14;
    }
    // Role match (SP vs RP)
    const playerRole = player.pos === 'RP' ? 'RP' : 'SP';
    const compRole = comp.pos === 'RP' ? 'RP' : 'SP';
    if (playerRole === compRole) { score += 8; } maxScore += 8;
  }

  // Conference match (bonus for same conf)
  if (comp.conf && comp.conf === player.conf) { score += 10; } maxScore += 10;
  // Age proximity
  if (comp.age != null) {
    const diff = Math.abs((player.age || 21) - comp.age);
    score += Math.max(0, 8 - diff * 3); maxScore += 8;
  }
  // Position match
  const playerPos = player.pos;
  const compPos = comp.pos || '';
  if (compPos === playerPos || compPos.includes(playerPos)) {
    score += 8; } maxScore += 8;
  // Level preference: D1 comps score slightly higher for avg/below prospects
  // MLB comps score higher for elite prospects (gem >= 75)
  if (comp.level === 'D1' && player.gemScore < 75) { score += 4; maxScore += 4; }
  if (comp.level === 'MLB' && player.gemScore >= 75) { score += 4; maxScore += 4; }

  return maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
}

function getTopComps(player, n=3) {
  const pool = player.isPitcher ? COMP_DB.pitchers : COMP_DB.hitters;
  return pool
    .map(c => ({ ...c, score: calcSimilarity(player, c) }))
    .sort((a,b) => b.score - a.score)
    .slice(0, n);
}

function getSchoolLogo(dest) {
  if (!dest) return null;
  const domain = SCHOOL_DOMAINS[dest];
  if (domain) return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  // fallback: try to guess domain from school name
  const slug = dest.toLowerCase().replace(/[^a-z0-9]/g,'').replace(/university|college|state/g,'');
  return `https://www.google.com/s2/favicons?domain=${slug}.edu&sz=64`;
}

function SchoolLogo({dest, size=22}) {
  const [src, setSrc] = React.useState(() => getSchoolLogo(dest));
  const [failed, setFailed] = React.useState(false);
  if (!dest || !src || failed) return null;
  return <img src={src} alt={dest}
    onError={() => {
      // try clearbit fallback
      const domain = SCHOOL_DOMAINS[dest];
      if (domain && src.includes('google.com')) {
        setSrc(`https://logo.clearbit.com/${domain}`);
      } else {
        setFailed(true);
      }
    }}
    style={{width:size,height:size,borderRadius:4,objectFit:"contain",flexShrink:0,background:"rgba(255,255,255,.06)",padding:1}}
  />;
}


function projectToConf(player, targetConf) {
  const target = CONF_TARGETS[targetConf];
  const source = CONF_SOURCE[player.conf] || { rating:0.85 };
  if (!target) return player.proj;

  if (!player.isPitcher && player.juco) {
    const jucoOps = player.juco.ops;
    // Step 1: normalize to D1-average baseline using source conference rating
    const normalizedOps = jucoOps * source.rating;
    // Step 2: regression to mean — elite stats face stronger regression
    // Calibrated from: Rulli ACCAC→C-USA (.791), Davis ACCAC→Pac12 (.825), Climie R14→AAC (~.939)
    let regressionFactor;
    if (normalizedOps > 0.900) {
      regressionFactor = 0.88 - (normalizedOps - 0.900) * 0.12; // steep dropoff for elite
    } else if (normalizedOps > 0.780) {
      regressionFactor = 0.91; // mid-tier holds value better
    } else {
      regressionFactor = 0.94; // below-avg faces less regression (survivorship bias)
    }
    // Step 3: apply target conference difficulty (normalized against C-USA baseline 0.828)
    const projOps = Math.round(normalizedOps * regressionFactor * target.opsMult / 0.828 * 1000) / 1000;
    const projObp = Math.round(player.juco.obp * source.rating * regressionFactor * target.opsMult / 0.828 * 1.01 * 1000) / 1000;
    let projSlg = Math.round((projOps - projObp) * 1000) / 1000;
    if (projSlg < projObp * 0.75) projSlg = Math.round(projObp * 0.85 * 1000) / 1000;
    const finalOps = Math.round((projObp + projSlg) * 1000) / 1000;
    return { ...player.proj, ops:finalOps, obp:projObp, slg:projSlg,
      floor:Math.round((finalOps-0.062)*1000)/1000, ceil:Math.round((finalOps+0.068)*1000)/1000 };
  }

  if (player.isPitcher && player.jucoP) {
    const normalizedEra = player.jucoP.era / source.rating;
    // K/9 adjustment: high-K arms maintain ERA better at D1
    const kAdjust = player.jucoP.k9 > 10 ? 0.94 : player.jucoP.k9 > 8 ? 1.00 : 1.08;
    const projEra = Math.round(normalizedEra * kAdjust * target.eraMult / 1.18 * 100) / 100;
    const projWhip = Math.round(player.jucoP.whip / source.rating * kAdjust * (target.eraMult/1.18) * 0.96 * 100) / 100;
    const projFip = Math.round(player.jucoP.fip / source.rating * kAdjust * target.eraMult / 1.18 * 100) / 100;
    return { ...player.proj, era:projEra, whip:projWhip, fip:projFip,
      k9:Math.round(player.jucoP.k9*0.86*100)/100,
      bb9:Math.round(player.jucoP.bb9*1.12*100)/100,
      floor:Math.round((projEra+0.75)*100)/100,
      ceil:Math.round((projEra-0.55)*100)/100 };
  }
  return player.proj;
}

};

function useLocalStorage(key,initial){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):initial;}catch{return initial;}});
  const set=useCallback((v)=>{const next=typeof v==="function"?v(val):v;setVal(next);try{localStorage.setItem(key,JSON.stringify(next));}catch{}},[key,val]);
  return[val,set];
}

function Avatar({name,size=36}){
  const c=["#3C3489","#085041","#712B13","#0C447C","#633806"][name.charCodeAt(0)%5];
  return <div style={{width:size,height:size,borderRadius:"50%",background:c+"33",border:`1px solid ${c}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.35,fontWeight:600,color:c+"cc",flexShrink:0,fontFamily:"'DM Mono',monospace"}}>{initials(name)}</div>;
}
function Badge({text,type}){
  const[bg,col]=type==="flag"?(flagColors[text]||["rgba(255,255,255,.08)","#94a3b8"]):type==="status"?(statusColors[text]||["rgba(255,255,255,.08)","#94a3b8"]):["rgba(255,255,255,.08)","#94a3b8"];
  return <span style={{display:"inline-block",fontSize:10,fontWeight:600,letterSpacing:".06em",padding:"2px 7px",borderRadius:3,background:bg,color:col,textTransform:"uppercase",whiteSpace:"nowrap"}}>{text}</span>;
}
function ProbBar({label,value,color="#4ade80"}){
  return <div style={{marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:12,color:"#94a3b8"}}>{label}</span>
      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500,color}}>{value}%</span>
    </div>
    <div style={{height:4,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}>
      <div style={{width:`${value}%`,height:"100%",background:color,opacity:.75,borderRadius:2}}/>
    </div>
  </div>;
}

  const p=player,proj=projectToConf(p,targetConf),mainStat=getMainStat(p),isERA=p.isPitcher;
  const projStat=isERA?proj.era:proj.ops;
  const playerNotes=notes[p.id]||[];

  const tabBar=<div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,.06)",background:asDrawer?"#0c111b":"transparent",flexShrink:0}}>
    {["overview","stats","projections","comps","notes"].map(t=>(
      <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",borderBottom:tab===t?"2px solid #f6ad55":"2px solid transparent",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,padding:"7px 12px",color:tab===t?"#f6ad55":"#718096",textTransform:"capitalize"}}>{t}</button>
    ))}
  </div>;

  if(asDrawer) return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {tabBar}
    <div style={{padding:"12px 20px",flex:1,overflowY:"auto"}}>
      {tab==="overview"&&<div>
        <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.7,marginBottom:16}}>{p.notes}</p>
        <div style={S.divider}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[["Height",p.ht],["Weight",p.wt+"lb"],["Bats/Throws",p.bats+"/"+p.throws],["Hometown",p.hometown]].map(([l,v])=>(
            <div key={l} style={{...S.card,padding:"8px 12px"}}><div style={{fontSize:10,color:"#4a5568"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#e2e8f0",marginTop:2}}>{v}</div></div>
          ))}
        </div>
        <button onClick={()=>onWatch(p.id)} style={{width:"100%",padding:"9px 0",borderRadius:6,cursor:"pointer",background:watched?"rgba(246,173,85,.15)":"rgba(255,255,255,.04)",border:`1px solid ${watched?"rgba(246,173,85,.4)":"rgba(255,255,255,.08)"}`,color:watched?"#f6ad55":"#718096",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>
          {watched?"★ Watchlisted":"☆ Add to Watchlist"}
        </button>
      </div>}
      {tab==="stats"&&<div>
        <div style={{...S.label,marginBottom:8}}>Raw {p.year} JUCO Stats</div>
        {!isERA&&p.juco?<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:14}}>
          {[["AVG",fmt3(p.juco.avg)],["OBP",fmt3(p.juco.obp)],["SLG",fmt3(p.juco.slg)],["OPS",fmt3(p.juco.ops),"#f6ad55"],["ISO",fmt3(p.juco.iso)],["BB%",p.juco.bbPct+"%"],["K%",p.juco.kPct+"%"],["PA",p.juco.pa],["HR",p.juco.hr],["SB",p.juco.sb],["2B",p.juco.doubles],["3B",p.juco.triples]].map(([l,v,c])=>(
            <div key={l} style={{...S.card,padding:"8px 10px"}}><div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,color:c||"#a5b4fc",marginTop:2}}>{v}</div></div>
          ))}
        </div>:p.jucoP?<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:14}}>
          {[["ERA",fmt2(p.jucoP.era),"#f6ad55"],["WHIP",fmt2(p.jucoP.whip)],["FIP",fmt2(p.jucoP.fip)],["K/9",p.jucoP.k9?.toFixed(1)],["BB/9",p.jucoP.bb9?.toFixed(1)],["IP",p.jucoP.ip],["Velo",p.jucoP.velo+" mph"],["GS",p.jucoP.gs],["SV",p.jucoP.sv]].map(([l,v,c])=>(
            <div key={l} style={{...S.card,padding:"8px 10px"}}><div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,color:c||"#a5b4fc",marginTop:2}}>{v}</div></div>
          ))}
        </div>:null}
        <div style={{...S.card,padding:"12px 14px"}}>
          {[["Conf-adj percentile",p.confAdj+"th","#f6ad55"],["Source conf strength",(CONF_SOURCE[p.conf]?.rating||0).toFixed(2),"#93c5fd"],["YoY trend",p.trend,p.trend?.startsWith("+")||p.trend?.startsWith("−0")&&p.isPitcher?"#4ade80":"#f87171"]].map(([l,v,c])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#94a3b8",marginBottom:6}}>
              <span>{l}</span><span style={{fontFamily:"'DM Mono',monospace",color:c}}>{v}</span>
            </div>
          ))}
        </div>
      </div>}
      {tab==="projections"&&<div>
        <div style={{...S.label}}>Projection → {CONF_TARGETS[targetConf]?.label}</div>
        <div style={{...S.card,marginBottom:14}}>
          {[["1. Raw JUCO stat",mainStat!=null?(isERA?fmt2(mainStat):fmt3(mainStat)):"—","#e2e8f0"],["2. Source conf ×"+(CONF_SOURCE[p.conf]?.rating||0.85).toFixed(2),isERA?fmt2(mainStat*(1/(CONF_SOURCE[p.conf]?.rating||0.85))):fmt3(mainStat*(CONF_SOURCE[p.conf]?.rating||0.85)),"#94a3b8"],["3. Target conf ×"+(isERA?CONF_TARGETS[targetConf]?.eraMult:CONF_TARGETS[targetConf]?.opsMult)?.toFixed(3),projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—","#93c5fd"]].map(([step,val,col])=>(
            <div key={step} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
              <span style={{fontSize:12,color:"#94a3b8"}}>{step}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500,color:col}}>{val}</span>
            </div>
          ))}
        </div>
        <div style={{...S.card,padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:12}}>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#f87171"}}>{isERA?fmt2(proj.floor):fmt3(proj.floor)} floor</span>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#93c5fd",fontWeight:600,fontSize:16}}>{projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—"}</span>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#4ade80"}}>{isERA?fmt2(proj.ceil):fmt3(proj.ceil)} ceil</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.06)",borderRadius:4,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",left:"10%",width:"80%",height:"100%",background:"rgba(147,197,253,.2)",borderRadius:4}}/>
            <div style={{position:"absolute",left:"45%",width:3,height:"100%",background:"#93c5fd",borderRadius:2}}/>
          </div>
        </div>
        <ProbBar label={`P(${isERA?"30+ IP":"100+ PA"}, yr 1)`} value={isERA?(p.probs.d1IP||0):(p.probs.d1PA||0)} color="#22c55e"/>
        <ProbBar label="P(above-avg D1 starter)" value={p.probs.avgStarter||0} color="#4ade80"/>
        <ProbBar label="P(roster retained yr 2)" value={p.probs.retained||0} color="#93c5fd"/>
        <ProbBar label="P(pro opportunity)" value={p.probs.pro||0} color="#a78bfa"/>
      </div>}
      {tab==="comps"&&<div>
        {(()=>{
          const comps=getTopComps(p,4);
          const mlbComps=comps.filter(c=>c.level==="MLB");
          const d1Comps=comps.filter(c=>c.level==="D1"||c.level==="MiLB");
          const levelColor={"D1":"#93c5fd","MiLB":"#a78bfa","MLB":"#f6ad55"};
          const levelBg={"D1":"rgba(147,197,253,.1)","MiLB":"rgba(167,139,250,.1)","MLB":"rgba(246,173,85,.12)"};
          return <div>
            <div style={{...S.label,marginBottom:4}}>Historical Comparable Players</div>
            <p style={{fontSize:11,color:"#4a5568",marginBottom:14,lineHeight:1.5}}>Matched by {p.isPitcher?"ERA, K/9, velocity":"OPS, K%, ISO"}, conference, age, and position. Similarity score 0–100.</p>
            {comps.length===0&&<p style={{fontSize:13,color:"#4a5568",fontStyle:"italic"}}>No comps found.</p>}
            {comps.map(c=>(
              <div key={c.id} style={{...S.card,marginBottom:10,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{c.name}</span>
                      <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:3,
                        background:levelBg[c.level]||"rgba(255,255,255,.06)",
                        color:levelColor[c.level]||"#94a3b8",letterSpacing:".06em"}}>{c.level}</span>
                      {c.level==="MLB"&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:3,background:"rgba(246,173,85,.08)",color:"#f6ad55"}}>⚾ MLB</span>}
                    </div>
                    <div style={{fontSize:11,color:"#4a5568"}}>{c.jucoSchool} ({c.conf||"—"}) · {c.jucoYear||"—"} · {c.pos}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:600,color:c.score>=75?"#4ade80":c.score>=55?"#f6ad55":"#94a3b8"}}>{c.score}</div>

                  </div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  <div style={{background:"rgba(255,255,255,.03)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>JUCO Line</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#f6ad55",lineHeight:1.5}}>{c.jucoLine||"—"}</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,.03)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:levelColor[c.level]||"#94a3b8",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>{c.level} Line</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#93c5fd",lineHeight:1.5}}>{c.destLine||"—"}</div>
                  </div>
                </div>

                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:c.proPath?8:0}}>{c.outcome}</div>

                {c.proPath&&<div style={{marginTop:6,padding:"7px 10px",background:"rgba(246,173,85,.06)",borderRadius:6,border:"1px solid rgba(246,173,85,.15)"}}>
                  <div style={{fontSize:9,color:"#f6ad55",textTransform:"uppercase",letterSpacing:".08em",marginBottom:2}}>Pro Path</div>

                </div>}

                {c.tags&&c.tags.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>
                  {c.tags.map(t=><span key={t} style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"rgba(255,255,255,.05)",color:"#4a5568",textTransform:"uppercase",letterSpacing:".06em"}}>{t}</span>)}
                </div>}
              </div>
            ))}

            {mlbComps.length>0&&<div style={{marginTop:16,padding:"12px 14px",background:"rgba(246,173,85,.04)",border:"1px solid rgba(246,173,85,.12)",borderRadius:8}}>
              <div style={{fontSize:11,fontWeight:600,color:"#f6ad55",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                ⚾ MLB Ceiling Note
              </div>
              <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,margin:0}}>
                {mlbComps.length} of your top comps reached MLB. This player{p.isPitcher?" shares a similar arm profile with":" shares hitting profile traits with"} {mlbComps.map(c=>c.name).join(" and ")}. Pro potential is real — JUCO players with this profile have gone {mlbComps.some(c=>c.tags?.includes("straight-to-pro"))?"directly to professional baseball":"through D1 to pro"}.
              </p>
            </div>}

            <div style={{...S.divider}}/>
            <div style={{fontSize:10,color:"#4a5568",lineHeight:1.6}}>
              Similarity scores are calculated from {p.isPitcher?"ERA, K/9, and velocity":"OPS, K%, and ISO"} differential, conference strength match, age, and position. Higher score = closer statistical profile to the comp player.
            </div>
          </div>;
        })()}
      </div>}

      {tab==="notes"&&<div>
        <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add scouting observations…"
          style={{width:"100%",minHeight:80,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:10,color:"#e2e8f0",fontFamily:"'DM Sans',sans-serif",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box",marginBottom:8}}/>
        <button onClick={()=>{if(!noteText.trim())return;onNote(p.id,{text:noteText,timestamp:new Date().toISOString()});setNoteText("");}}
          style={{padding:"8px 20px",background:"rgba(246,173,85,.15)",border:"1px solid rgba(246,173,85,.3)",borderRadius:6,cursor:"pointer",color:"#f6ad55",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,marginBottom:16}}>Add Note</button>
        {playerNotes.length===0?<p style={{fontSize:13,color:"#4a5568",fontStyle:"italic"}}>No notes yet.</p>
          :playerNotes.slice(0,5).map((n,i)=>(
            <div key={i} style={{...S.card,marginBottom:8}}>
              <div style={{fontSize:10,color:"#4a5568",marginBottom:4}}>{new Date(n.timestamp).toLocaleDateString()}</div>
              <p style={{fontSize:12,color:"#94a3b8",margin:0,lineHeight:1.6}}>{n.text}</p>
            </div>
          ))
        }
      </div>}
    </div>
  </div>;

  // Original non-drawer right-panel render
  return <div style={{position:"fixed",top:0,right:0,height:"100vh",width:"min(500px,100vw)",background:"#0c111b",borderLeft:"1px solid rgba(255,255,255,.08)",zIndex:100,display:"flex",flexDirection:"column",overflowY:"auto",animation:"slideInRight .2s ease"}}>
    <div style={{padding:"20px 24px 0",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div>
          <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:1,color:"#f6ad55",lineHeight:1,margin:0}}>{p.name.toUpperCase()}</h2>
          <p style={{fontSize:12,color:"#718096",margin:"4px 0 0"}}>{p.pos} · {p.bats}/{p.throws} · {p.ht} {p.wt}lb · Age {p.age} · {p.hometown}</p>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#4a5568",cursor:"pointer",fontSize:20,padding:4,minWidth:44,minHeight:44,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        <Badge text={p.status} type="status"/>
        {p.dest&&<div style={{display:"flex",alignItems:"center",gap:5}}>
          <SchoolLogo dest={p.dest} size={16}/>
          <span style={{fontSize:12,fontWeight:600,color:p.status==="committed"?"#4ade80":p.status==="signed"?"#93c5fd":"#a78bfa"}}>→ {p.dest}</span>
        </div>}
        {p.flag&&<Badge text={p.flag} type="flag"/>}
        <span style={{fontSize:11,color:"#4a5568"}}>{p.school} · {p.conf} · {p.year}</span>
      </div>
      {tabBar}
    </div>
    <div style={{padding:"14px 24px",flex:1,overflowY:"auto"}}>
      {tab==="overview"&&<div>
        <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.7,marginBottom:16}}>{p.notes}</p>
        <div style={S.divider}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[["Height",p.ht],["Weight",p.wt+"lb"],["Bats/Throws",p.bats+"/"+p.throws],["Hometown",p.hometown]].map(([l,v])=>(
            <div key={l} style={{...S.card,padding:"8px 12px"}}><div style={{fontSize:10,color:"#4a5568"}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#e2e8f0",marginTop:2}}>{v}</div></div>
          ))}
        </div>
        <button onClick={()=>onWatch(p.id)} style={{width:"100%",padding:"9px 0",borderRadius:6,cursor:"pointer",background:watched?"rgba(246,173,85,.15)":"rgba(255,255,255,.04)",border:`1px solid ${watched?"rgba(246,173,85,.4)":"rgba(255,255,255,.08)"}`,color:watched?"#f6ad55":"#718096",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500}}>
          {watched?"★ In Pipeline":"☆ Add to Pipeline"}
        </button>
      </div>}
      {tab!=="overview"&&<div style={{padding:"4px 0"}}>{/* other tabs rendered below */}</div>}
    </div>
  </div>;
}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return isMobile;
}

function PriorityStars({value, onChange}) {
  return <div style={{display:"flex",gap:2}}>
    {[1,2,3].map(n=>(
      <span key={n} onClick={e=>{e.stopPropagation();onChange(n===value?0:n);}}
        style={{cursor:"pointer",fontSize:13,color:n<=value?"#f6ad55":"#2d3748",lineHeight:1}}>★</span>
    ))}
  </div>;
}

      // For ERA-based stats, lower value = better pitcher, so invert sort direction
      // isPitcher check: use first player in comparison to detect pitcher context
      const aIsPitcher = a.isPitcher, bIsPitcher = b.isPitcher;
      const bothPitchers = aIsPitcher && bIsPitcher;
      const eraCol = (sortCol==="stat"||sortCol==="projStat") && bothPitchers;
      if(sortCol==="stat"){va=getMainStat(a)??999;vb=getMainStat(b)??999;}  // WHIP for pitchers, OPS for hitters

      else if(sortCol==="probs_d1"){va=(a.isPitcher?a.probs.d1IP:a.probs.d1PA)??0;vb=(b.isPitcher?b.probs.d1IP:b.probs.d1PA)??0;}

      const eraInvert = eraCol ? -1 : 1;

          </div>

        {/* ── TABLE (desktop) ── */}

                    <td style={{padding:"5px 8px",textAlign:"right"}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500,color:"#93c5fd"}}>{projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—"}</span>

        {/* ── CARD LIST (mobile) ── */}

              const d1Prob=isERA?(p.probs.d1IP||0):(p.probs.d1PA||0);
              return <div key={p.id} onClick={()=>setSelected(selected===p.id?null:p.id)}

                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{p.name}</span>
                      {p.flag&&<Badge text={p.flag} type="flag"/>}
                      <Badge text={p.status} type="status"/>
                    </div>
                    <div style={{fontSize:11,color:"#4a5568"}}>{p.pos} · {p.school} · {p.conf}</div>
                    {(p.status==="committed"||p.status==="signed")&&p.dest&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>

                    </div>}
                  </div>
                  <button onClick={e=>{e.stopPropagation();inPipeline(p.id)?removeFromPipeline(p.id):addToPipeline(p.id);}}

                </div>
                <div style={{display:"flex",gap:12,fontFamily:"'DM Mono',monospace",fontSize:12}}>
                  <span style={{color:"#94a3b8"}}>{isERA?"WHIP":"OPS"} <span style={{color:"#e2e8f0",fontWeight:500}}>{mainStat!=null?(isERA?fmt2(mainStat):fmt3(mainStat)):"—"}</span></span>
                  <span style={{color:"#4a5568"}}>→</span>
                  <span style={{color:"#93c5fd",fontWeight:500}}>{projStat!=null?(isERA?fmt2(projStat):fmt3(projStat)):"—"}</span>
                  <span style={{color:"#4a5568"}}>Gem <span style={{color:gemColor(p.gemScore),fontWeight:600}}>{p.gemScore}</span></span>
                  <span style={{color:"#4a5568"}}>Risk <span style={{color:riskColor(p.riskScore)}}>{p.riskScore}</span></span>
                </div>
              </div>;
            })
          }
        </div>}
      </div>}

      {/* ── PIPELINE (Kanban) ── */}
      {view==="pipeline"&&<div style={{flex:1,overflowX:"auto",overflowY:"auto",padding:"20px 20px"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:20}}>
          <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,color:"#e2e8f0",margin:0}}>RECRUITING PIPELINE</h1>
          <span style={{fontSize:12,color:"#4a5568"}}>{Object.keys(pipeline).length} players tracked</span>

        <div style={{display:"flex",gap:12,minWidth:"max-content",alignItems:"flex-start"}}>
          {STAGES.map(stage=>{
            const stagePlayers=Object.entries(pipeline)
              .filter(([,v])=>v.stage===stage.key)
              .map(([id,meta])=>({id:Number(id),meta,player:players.find(p=>p.id===Number(id))}))
              .filter(x=>x.player)
              .sort((a,b)=>(b.meta.priority||0)-(a.meta.priority||0)||(b.player.gemScore-a.player.gemScore));
            return <div key={stage.key} style={{minWidth:220,width:220,background:"rgba(255,255,255,.02)",borderRadius:8,padding:12,border:`1px solid rgba(255,255,255,.05)`}}>

                    </div>
                    <button onClick={e=>{e.stopPropagation();removeFromPipeline(id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#4a5568",fontSize:14,padding:2,lineHeight:1}}>×</button>

        <div style={{...S.card,marginBottom:24,maxWidth:520}}>

              <select value={calcJucoConf} onChange={e=>setCalcJucoConf(e.target.value)} style={{...S.sel,width:"100%"}}>
                {Object.entries(CONF_SOURCE).map(([k])=><option key={k} value={k}>{k}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:"#4a5568",textTransform:"uppercase",letterSpacing:".08em",marginBottom:4}}>Your Target Conference</div>
              <select value={calcTargetConf} onChange={e=>setCalcTargetConf(e.target.value)} style={{...S.sel,width:"100%"}}>
                {Object.entries(CONF_TARGETS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:"#4a5568",textTransform:"uppercase",letterSpacing:".08em",marginBottom:4}}>Player's JUCO OPS</div>

          </div>
          <div style={{height:1,background:"rgba(255,255,255,.06)",margin:"0 0 14px"}}/>
          {calcResult?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>

              <div style={{fontSize:9,color:"#93c5fd",textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>Projected OPS</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:"#93c5fd"}}>{fmt3(calcResult.proj)}</div>
            </div>
            <div style={{background:"rgba(255,255,255,.03)",borderRadius:6,padding:"10px 12px"}}>
              <div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>80% CI Range</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#94a3b8",marginTop:4}}>{fmt3(calcResult.floor)} — {fmt3(calcResult.ceil)}</div>
            </div>
            <div style={{background:"rgba(248,113,113,.06)",borderRadius:6,padding:"10px 12px"}}>
              <div style={{fontSize:9,color:"#f87171",textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>Discount</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:600,color:"#f87171"}}>−{calcResult.discount}%</div>
            </div>
          </div>:<p style={{fontSize:13,color:"#4a5568"}}>Enter an OPS value above to calculate.</p>}
        </div>

        {/* Visual discount bars - target conferences */}
        <div style={{...S.card,marginBottom:20}}>
          <div style={{...S.label}}>D1 Conference Difficulty (how much of JUCO OPS is preserved)</div>
          {Object.entries(CONF_TARGETS).sort((a,b)=>b[1].opsMult-a[1].opsMult).map(([k,d])=>{
            const pct=Math.round(d.opsMult/maxOpsMult*100);
            const tier=d.opsMult>=0.840?"mid":d.opsMult>=0.800?"high":"power";
            const col=tier==="power"?"#93c5fd":tier==="high"?"#f6ad55":"#94a3b8";
            const discount=Math.round((1-d.opsMult/maxOpsMult)*100);
            return <div key={k} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:"#e2e8f0"}}>{d.label}</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#4a5568"}}>{discount>0?`−${discount}% vs easiest`:"Most favorable"}</span>

              <div style={{height:6,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:3,opacity:.75}}/>
              </div>
            </div>;

        <div style={{...S.card}}>
          <div style={{...S.label}}>JUCO Source Conference Strength</div>
          {Object.entries(CONF_SOURCE).sort((a,b)=>b[1].rating-a[1].rating).map(([k,d])=>{
            const col=d.rating>=0.88?"#f6ad55":d.rating>=0.82?"#93c5fd":"#94a3b8";
            return <div key={k} style={{marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                <span style={{fontSize:12,color:"#e2e8f0"}}>{k}</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:col}}>{Math.round(d.rating*100)}% strength · {d.d1Rate}% D1 success</span>
              </div>
              <div style={{height:5,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${d.rating*100}%`,height:"100%",background:col,borderRadius:3,opacity:.7}}/>
              </div>
            </div>;
          })}
        </div>
      </div>}

      {/* ── BOTTOM DRAWER detail panel ── */}
      {selPlayer&&<div style={{position:"fixed",bottom:0,left:0,right:0,height:"min(520px,55vh)",background:"#0c111b",borderTop:"2px solid #f6ad55",boxShadow:"0 -8px 32px rgba(0,0,0,.6)",zIndex:50,display:"flex",flexDirection:"column",animation:"slideInUp .2s ease"}}>
        {/* Drawer header */}
        <div style={{padding:"0 16px",height:48,borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:10,flexShrink:0,overflowX:"auto"}}>
          <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:"#4a5568",cursor:"pointer",fontSize:16,padding:"4px 8px",flexShrink:0}}>✕</button>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1,color:"#f6ad55",flexShrink:0}}>{selPlayer.name.toUpperCase()}</span>
          <span style={{fontSize:11,color:"#4a5568",flexShrink:0}}>{selPlayer.pos} · {selPlayer.conf}</span>
          {selPlayer.dest&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            <SchoolLogo dest={selPlayer.dest} size={14}/>
            <span style={{fontSize:11,fontWeight:600,color:"#4ade80"}}>→ {selPlayer.dest}</span>
          </div>}
          <div style={{width:1,height:18,background:"rgba(255,255,255,.08)",flexShrink:0}}/>
          {(()=>{const proj=projectToConf(selPlayer,targetConf);const ms=getMainStat(selPlayer);const ps=selPlayer.isPitcher?proj.era:proj.ops;return <>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>JUCO: <span style={{color:"#f6ad55"}}>{ms!=null?(selPlayer.isPitcher?fmt2(ms):fmt3(ms)):"—"}</span></span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>Proj: <span style={{color:"#93c5fd"}}>{ps!=null?(selPlayer.isPitcher?fmt2(ps):fmt3(ps)):"—"}</span></span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>Gem: <span style={{color:gemColor(selPlayer.gemScore),fontWeight:600}}>{selPlayer.gemScore}</span></span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>Risk: <span style={{color:riskColor(selPlayer.riskScore)}}>{selPlayer.riskScore} {riskLabel(selPlayer.riskScore)}</span></span>
          </>;})()} 
          <div style={{marginLeft:"auto",flexShrink:0}}/>
        </div>
        {/* Drawer body — reuse PlayerDetail content */}
        <div style={{flex:1,overflow:"hidden"}}>
          <PlayerDetail player={selPlayer} targetConf={targetConf} onClose={()=>setSelected(null)}
            watched={inPipeline(selPlayer.id)} onWatch={(id)=>inPipeline(id)?removeFromPipeline(id):addToPipeline(id)}
            notes={notes} onNote={onNote} asDrawer={true}/>
        </div>
      </div>}

    </main>

    {/* ── MOBILE BOTTOM TAB BAR ── */}
    {isMobile&&<nav style={{position:"fixed",bottom:0,left:0,right:0,height:52,background:"#0a0f1a",borderTop:"1px solid rgba(255,255,255,.08)",display:"flex",zIndex:30}}>
      {[["board","📋","Board"],["pipeline","⭐","Pipeline"],["conferences","🏛","Confs"],["help","?","Help"]].map(([v,icon,lbl])=>(
        <button key={v} onClick={()=>v==="help"?setHelpOpen(true):setView(v)}
          style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,color:(view===v&&v!=="help")?"#f6ad55":"#4a5568",fontFamily:"'DM Sans',sans-serif"}}>
          <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
          <span style={{fontSize:9,fontWeight:600,letterSpacing:".04em"}}>{lbl.toUpperCase()}</span>
        </button>
      ))}
    </nav>}

    <MobileFilterSheet/>
    {helpOpen&&<HelpModal onClose={()=>setHelpOpen(false)}/>}
    {cmdOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"80px 20px"}} onClick={e=>e.target===e.currentTarget&&setCmdOpen(false)}>
      <div style={{background:"#0f1623",border:"1px solid rgba(255,255,255,.1)",borderRadius:12,width:"100%",maxWidth:520,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          <input autoFocus value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Search players…" onKeyDown={e=>e.key==="Escape"&&setCmdOpen(false)}
            style={{flex:1,background:"none",border:"none",color:"#e2e8f0",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
          <kbd style={{fontSize:11,color:"#4a5568",border:"1px solid rgba(255,255,255,.1)",borderRadius:4,padding:"2px 6px",fontFamily:"'DM Mono',monospace"}}>ESC</kbd>
        </div>
        {cmdQ.trim()===""?<p style={{padding:"20px 16px",fontSize:13,color:"#4a5568",margin:0}}>Type to search {players.length} players…</p>
          :cmdResults.length===0?<p style={{padding:"20px 16px",fontSize:13,color:"#4a5568",margin:0}}>No results.</p>
          :cmdResults.map(p=>(
            <div key={p.id} onClick={()=>{setSelected(p.id);setView("board");setCmdOpen(false);setCmdQ("");}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
              <Avatar name={p.name} size={28}/>
              <div style={{flex:1}}><div style={{fontSize:13,color:"#e2e8f0"}}>{p.name}</div><div style={{fontSize:11,color:"#4a5568"}}>{p.pos} · {p.school}</div></div>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,padding:"2px 8px",borderRadius:3,background:"rgba(255,255,255,.05)",color:gemColor(p.gemScore)}}>{p.gemScore}</span>
              <Badge text={p.status} type="status"/>
            </div>
          ))
        }
      </div>
    </div>}
  </div>;
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
