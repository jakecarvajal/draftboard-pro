function parseGvizResponse(text) {
  const start = text.indexOf('{');
  const end   = text.lastIndexOf('}');
  const data  = JSON.parse(text.slice(start, end + 1));
  const cols  = data.table.cols.map(c => c.label);
  return data.table.rows.map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      const cell = row.c ? row.c[i] : null;
      obj[col] = (cell && cell.v !== undefined) ? cell.v : null;
    });
    return obj;
  });
}

function computeGemScore(player) {
  if (!player.isPitcher && player.juco) {
    const cp = computeProjections(player);
    if (!cp) return 50;
    const opsPts = Math.min(70, Math.max(0, Math.round((cp.proj_ops - 0.600) / 0.300 * 70)));
    const agePts = player.age <= 19 ? 10 : player.age === 20 ? 7 : player.age === 21 ? 4 : 0;
    const trendPts = (player.trend && player.trend.startsWith("+") && parseFloat(player.trend) > 0.080) ? 10 : 0;
    const confPts = player.confAdj > 0 ? Math.round(player.confAdj / 100 * 10) : Math.round(Math.min(10, opsPts / 7));
    return Math.min(100, Math.max(0, opsPts + agePts + trendPts + confPts));
  }
  if (player.isPitcher && player.jucoP) {
    const cp = computeProjections(player);
    if (!cp) return 50;
    const eraPts = Math.min(70, Math.max(0, Math.round((6.0 - cp.proj_era) / 4.0 * 70)));
    const agePts = player.age <= 19 ? 10 : player.age === 20 ? 7 : player.age === 21 ? 4 : 0;
    const trendPts = (player.trend && (player.trend.startsWith("\u2212") || player.trend.startsWith("-"))) ? 10 : 0;
    const confPts = player.confAdj > 0 ? Math.round(player.confAdj / 100 * 10) : 5;
    return Math.min(100, Math.max(0, eraPts + agePts + trendPts + confPts));
  }
  return 50;
}

function computeRiskScore(player) {
  const srcRating = CONF_SOURCE[player.conf] || 0.79;
  let risk = 20;
  if (!player.isPitcher && player.juco) {
    if ((player.juco.pa || 0) < 150) risk += 15;
    if ((player.juco.kPct || 0) > 22) risk += 10;
    else if ((player.juco.kPct || 0) > 18 && (player.juco.iso || 0) < 0.200) risk += 5;
    if (player.age >= 23) risk += 14;
    else if (player.age >= 22) risk += 8;
    if (srcRating < 0.75) risk += 8;
    if (player.trend && (player.trend.startsWith("-") && !player.trend.startsWith("-0"))) risk += 10;
    const cs = player.juco.cs || 0, sb = player.juco.sb || 0;
    if (sb > 10 && cs / (sb + cs) > 0.30) risk += 4;
  }
  if (player.isPitcher && player.jucoP) {
    if ((player.jucoP.ip || 0) < 40) risk += 15;
    if (player.age >= 23) risk += 14;
    else if (player.age >= 22) risk += 8;
    if (srcRating < 0.75) risk += 8;
    if (player.trend && player.trend.startsWith("+")) risk += 10;
  }
  return Math.min(72, Math.max(0, risk));
}

function computeProbs(player) {
  const g  = player.gemScore || 0;
  const k9 = player.jucoP?.k9 || 0;
  if (player.isPitcher) {
    return {
      d1IP:       Math.min(85, Math.max(20, Math.round(g * 0.85))),
      avgStarter: Math.min(75, Math.max(10, Math.round(g - 15 + (k9 > 9 ? 8 : 0)))),
      retained:   Math.min(85, Math.max(25, Math.round(g * 0.90))),
      pro:        Math.min(55, Math.max(3,  Math.round(g - 38))),
    };
  }
  return {
    d1PA:       Math.min(85, Math.max(20, Math.round(g * 0.85))),
    avgStarter: Math.min(75, Math.max(10, Math.round(g - 12))),
    retained:   Math.min(85, Math.max(25, Math.round(g * 0.90))),
    pro:        Math.min(55, Math.max(3,  Math.round(g - 35))),
  };
}

function computeProjections(player) {
  const srcRating = CONF_SOURCE[player.conf] || 0.82;

  if (!player.isPitcher && player.juco) {
    const pa  = parseFloat(player.juco.pa)  || 0;
    const ops = parseFloat(player.juco.ops) || 0;
    if (ops === 0) return null;
    const confidence = Math.min(1.0, pa / 150);
    const norm = ops * srcRating;
    let reg;
    if (norm > 0.980)      reg = Math.max(0.62, 0.79 - (norm - 0.980) * 0.22);
    else if (norm > 0.900) reg = 0.88 - (norm - 0.900) * 0.12;
    else if (norm > 0.780) reg = 0.91;
    else                   reg = 0.94;
    const raw_proj = norm * reg;
    const proj_ops = Math.round(((raw_proj * confidence) + (0.780 * (1 - confidence))) * 1000) / 1000;
    return {
      proj_ops,
      proj_floor: Math.round((proj_ops - 0.062) * 1000) / 1000,
      proj_ceil:  Math.round((proj_ops + 0.068) * 1000) / 1000,
    };
  }

  if (player.isPitcher && player.jucoP) {
    const ip   = parseFloat(player.jucoP.ip)   || 0;
    const era  = parseFloat(player.jucoP.era)  || 0;
    const k9   = parseFloat(player.jucoP.k9)   || 0;
    const whip = parseFloat(player.jucoP_whip) || 0;
    if (era === 0) return null;
    const confidence    = Math.min(1.0, ip / 40);
    const kAdj          = k9 > 10 ? 0.94 : k9 > 8 ? 1.00 : 1.08;
    const raw_proj      = (era / srcRating) * kAdj;
    const proj_era      = Math.round(((raw_proj * confidence) + (4.50 * (1 - confidence))) * 100) / 100;
    const raw_proj_whip = whip / srcRating;
    const proj_whip     = whip === 0 ? null : Math.round(((raw_proj_whip * confidence) + (1.35 * (1 - confidence))) * 100) / 100;
    return {
      proj_era,
      proj_whip,
      proj_floor: Math.round((proj_era + 0.75) * 100) / 100,
      proj_ceil:  Math.round(Math.max(1.80, proj_era - 0.55) * 100) / 100,
    };
  }

  return null;
}

function parsePlayer(row) {
  const bool = v => v === true || v === "TRUE" || v === "true" || v === "1";
  const num  = v => (v === "" || v == null) ? null : Number(v);
  const str  = v => (v === "" || v == null) ? null : String(v);
  const isPitcher = bool(row.isPitcher);
  const age = Number(row.age) || 21;
  const conf = row.conf || "";
  const juco = isPitcher ? null : {
    avg: num(row.juco_avg), obp: num(row.juco_obp), slg: num(row.juco_slg),
    ops: num(row.juco_ops), iso: num(row.juco_iso), bbPct: num(row.juco_bbPct),
    kPct: num(row.juco_kPct), sb: num(row.juco_sb), cs: num(row.juco_cs),
    pa: num(row.juco_pa), hr: num(row.juco_hr), rbi: num(row.juco_rbi),
    doubles: num(row.juco_doubles), triples: num(row.juco_triples),
  };
  const jucoP = !isPitcher ? null : {
    era: num(row.jucoP_era), whip: num(row.jucoP_whip), k9: num(row.jucoP_k9),
    bb9: num(row.jucoP_bb9), fip: num(row.jucoP_fip), ip: num(row.jucoP_ip),
    velo: num(row.jucoP_velo), gs: num(row.jucoP_gs), sv: num(row.jucoP_sv),
  };
  const proj = {
    ops: num(row.proj_ops), obp: num(row.proj_obp), slg: num(row.proj_slg),
    floor: num(row.proj_floor), ceil: num(row.proj_ceil),
    era: num(row.proj_era), fip: num(row.proj_fip),
    k9: num(row.proj_k9), bb9: num(row.proj_bb9),
  };
  const probs = {
    d1PA: num(row.probs_d1PA), d1IP: num(row.probs_d1IP),
    avgStarter: num(row.probs_avgStarter), retained: num(row.probs_retained),
    pro: num(row.probs_pro),
  };
  const rawGem  = num(row.gemScore);
  const rawRisk = num(row.riskScore);
  const trend   = str(row.trend) || "";
  const confAdj = num(row.confAdj) || 0;
  const status  = str(row.status) || "available";
  const dest    = str(row.dest);
  const flag    = str(row.flag);
  const notes   = str(row.notes) || "";
  const partial = { isPitcher, age, conf, juco, jucoP, trend, confAdj };
  const gemScore  = (rawGem  && rawGem  > 0) ? rawGem  : computeGemScore(partial);
  const riskScore = (rawRisk && rawRisk > 0) ? rawRisk : computeRiskScore(partial);
  let autoFlag = flag;
  if (!autoFlag) {
    if (gemScore >= 78 && status === "available") autoFlag = "HOT";
    else if (trend && trend.startsWith("+") && parseFloat(trend) > 0.080) autoFlag = "RISING";
  }
  return {
    id: Number(row.id), name: row.name, pos: row.pos, school: row.school,
    conf, year: Number(row.year), age, ht: row.ht, wt: Number(row.wt),
    bats: row.bats, throws: row.throws, hometown: row.hometown,
    isPitcher, juco, jucoP,
    jucoP_whip: isPitcher ? num(row.jucoP_whip) : null,
    proj, probs,
    gemScore, riskScore, trend, confAdj, status, dest,
    flag: autoFlag, notes,
  };
}

// Parse a raw SheetDB comp row into the shape calcSimilarity expects.
function parseComp(row) {
  const num = v => (v === "" || v == null) ? null : Number(v);
  const str = v => (v === "" || v == null) ? null : String(v).trim();
  return {
    id:         str(row.id),
    type:       str(row.type),       // "hitter" | "pitcher"
    name:       str(row.name),
    pos:        str(row.pos),
    jucoSchool: str(row.jucoSchool),
    jucoYear:   num(row.jucoYear),
    conf:       str(row.conf),
    jucoLine:   str(row.jucoLine),
    // hitter stats
    jucoOps:    num(row.jucoOps),
    jucoKpct:   num(row.jucoKpct),
    jucoIso:    num(row.jucoIso),
    // pitcher stats
    jucoEra:    num(row.jucoEra),
    jucoK9:     num(row.jucoK9),
    velo:       num(row.velo),
    // shared
    age:        num(row.age),
    level:      str(row.level),      // "D1" | "MLB" | "MiLB"
    dest:       str(row.dest),
    destLine:   str(row.destLine),
    outcome:    str(row.outcome),
    proPath:    str(row.proPath),
    tags:       row.tags ? String(row.tags).split(',').map(t => t.trim()) : [],
  };
}

function calcSimilarity(player, comp) {
  let score = 0, maxScore = 0;
  if (!player.isPitcher) {
    const ops = player.juco?.ops || 0;
    if (comp.jucoOps != null) { const diff = Math.abs(ops - comp.jucoOps); score += Math.max(0, 28 - diff * 140); maxScore += 28; }
    if (comp.jucoKpct != null && player.juco?.kPct != null) { const diff = Math.abs(player.juco.kPct - comp.jucoKpct); score += Math.max(0, 18 - diff * 1.1); maxScore += 18; }
    if (comp.jucoIso != null && player.juco?.iso != null) { const diff = Math.abs(player.juco.iso - comp.jucoIso); score += Math.max(0, 14 - diff * 75); maxScore += 14; }
    if (player.juco?.sb != null) { const compIsSpeed = comp.tags?.includes('speed'); if (player.juco.sb > 20 && compIsSpeed) { score += 6; } maxScore += 6; }
  }
  if (player.isPitcher) {
    const era = player.jucoP?.era || 4;
    if (comp.jucoEra != null) { const diff = Math.abs(era - comp.jucoEra); score += Math.max(0, 24 - diff * 9); maxScore += 24; }
    if (comp.jucoK9 != null && player.jucoP?.k9 != null) { const diff = Math.abs(player.jucoP.k9 - comp.jucoK9); score += Math.max(0, 18 - diff * 2.8); maxScore += 18; }
    if (comp.velo != null && player.jucoP?.velo != null) { const diff = Math.abs(player.jucoP.velo - comp.velo); score += Math.max(0, 14 - diff * 1.8); maxScore += 14; }
    const playerRole = player.pos === 'RP' ? 'RP' : 'SP';
    const compRole = comp.pos === 'RP' ? 'RP' : 'SP';
    if (playerRole === compRole) { score += 8; } maxScore += 8;
  }
  if (comp.conf && comp.conf === player.conf) { score += 10; } maxScore += 10;
  if (comp.age != null) { const diff = Math.abs((player.age || 21) - comp.age); score += Math.max(0, 8 - diff * 3); maxScore += 8; }
  const playerPos = player.pos, compPos = comp.pos || '';
  if (compPos === playerPos || compPos.includes(playerPos)) { score += 8; } maxScore += 8;
  if (comp.level === 'D1' && player.gemScore < 75) { score += 4; maxScore += 4; }
  if (comp.level === 'MLB' && player.gemScore >= 75) { score += 4; maxScore += 4; }
  return maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
}

function getTopComps(player, comps, n=3) {
  // comps is the live array fetched from SheetDB (flat, parsed by parseComp)
  const wantType = player.isPitcher ? "pitcher" : "hitter";
  const pool = comps.filter(c => c.type === wantType);
  return pool.map(c => ({ ...c, score: calcSimilarity(player, c) })).sort((a,b) => b.score - a.score).slice(0, n);
}

function getSchoolLogo(dest) {
  if (!dest) return null;
  const domain = SCHOOL_DOMAINS[dest];
  if (domain) return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  const slug = dest.toLowerCase().replace(/[^a-z0-9]/g,'').replace(/university|college|state/g,'');
  return `https://www.google.com/s2/favicons?domain=${slug}.edu&sz=64`;
}

function SchoolLogo({dest, size=22}) {
  const [src, setSrc] = React.useState(() => getSchoolLogo(dest));
  const [failed, setFailed] = React.useState(false);
  if (!dest || !src || failed) return null;
  return <img src={src} alt={dest}
    onError={() => { const domain = SCHOOL_DOMAINS[dest]; if (domain && src.includes('google.com')) { setSrc(`https://logo.clearbit.com/${domain}`); } else { setFailed(true); } }}
    style={{width:size,height:size,borderRadius:4,objectFit:"contain",flexShrink:0,background:"rgba(255,255,255,.06)",padding:1}}
  />;
}

function projectToConf(player, targetConf) {
  const target    = CONF_TARGETS[targetConf];
  const srcRating = CONF_SOURCE[player.conf] || 0.85;
  const cp        = computeProjections(player);

  if (!player.isPitcher && player.juco && cp && cp.proj_ops != null) {
    const scaleFactor = target ? target.opsMult / 0.828 : 1;
    const scaledOps   = Math.round(cp.proj_ops * scaleFactor * 1000) / 1000;
    const projObp     = player.juco.obp != null
      ? Math.round(player.juco.obp * srcRating * scaleFactor * 1.01 * 1000) / 1000
      : null;
    let projSlg = projObp != null ? Math.round((scaledOps - projObp) * 1000) / 1000 : null;
    if (projSlg != null && projSlg < projObp * 0.75) projSlg = Math.round(projObp * 0.85 * 1000) / 1000;
    const finalOps = projObp != null ? Math.round((projObp + projSlg) * 1000) / 1000 : scaledOps;
    return {
      ops:   finalOps,
      obp:   projObp,
      slg:   projSlg,
      floor: Math.round((finalOps - 0.062) * 1000) / 1000,
      ceil:  Math.round((finalOps + 0.068) * 1000) / 1000,
    };
  }

  if (player.isPitcher && player.jucoP && cp && cp.proj_era != null) {
    const k9   = parseFloat(player.jucoP.k9) || 0;
    const kAdj = k9 > 10 ? 0.94 : k9 > 8 ? 1.00 : 1.08;
    return {
      era:   cp.proj_era,
      whip:  cp.proj_whip,
      fip:   player.jucoP.fip  != null ? Math.round(player.jucoP.fip  / srcRating * kAdj * 100) / 100 : null,
      k9:    k9   ? Math.round(k9                  * 0.86 * 100) / 100 : null,
      bb9:   player.jucoP.bb9 ? Math.round(player.jucoP.bb9 * 1.12 * 100) / 100 : null,
      floor: cp.proj_floor,
      ceil:  cp.proj_ceil,
    };
  }

  return {};
}

const fmt2 = n => n == null ? "—" : Number(n).toFixed(2);

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch { return initial; } });
  const set = useCallback(v => { const next = typeof v === "function" ? v(val) : v; setVal(next); try { localStorage.setItem(key, JSON.stringify(next)); } catch {} }, [key, val]);
  return [val, set];
}

}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return isMobile;
}

function LoadMoreButton({visibleCount, totalCount, onLoadMore}) {
  if (totalCount <= visibleCount) {
    return visibleCount > 20 ? (
      <div style={{textAlign:"center",padding:"12px 0 20px"}}>
        <span style={{fontSize:11,color:"#4a5568"}}>All {totalCount} players shown</span>
      </div>
    ) : null;
  }
  const remaining = totalCount - visibleCount;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 0 32px",gap:8}}>
      <button onClick={onLoadMore}
        style={{padding:"10px 32px",background:"rgba(246,173,85,.12)",border:"1px solid rgba(246,173,85,.35)",borderRadius:8,cursor:"pointer",color:"#f6ad55",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,letterSpacing:".04em"}}
        onMouseEnter={e => e.currentTarget.style.background="rgba(246,173,85,.22)"}
        onMouseLeave={e => e.currentTarget.style.background="rgba(246,173,85,.12)"}>

      </button>
      <span style={{fontSize:11,color:"#4a5568"}}>Showing {visibleCount} of {totalCount} · {remaining} more</span>
    </div>
  );
}

function App() {
  const [players, setPlayers]       = useState([]);

      .catch(() => setLoadState("error"));

  useEffect(() => {

  const addToPipeline    = id => setPipeline(p => p[id] ? p : ({...p, [id]:{stage:"evaluating",addedAt:new Date().toISOString(),priority:0}}));
  const removeFromPipeline = id => setPipeline(p => { const n={...p}; delete n[id]; return n; });
  const setPipelineStage   = (id, stage)    => setPipeline(p => ({...p, [id]:{...p[id], stage}}));
  const setPipelinePriority= (id, priority) => setPipeline(p => ({...p, [id]:{...p[id], priority}}));
  const inPipeline = id => !!pipeline[id];
  const onNote = (pid, note) => setNotes(n => ({...n, [pid]:[...(n[pid]||[]), note]}));

  const advancedFilterCount = [confFilter.length>0, minGem>0, maxRisk<100, ageFilter.length>0].filter(Boolean).length;

  const filtered = useMemo(() => {
    let p = [...players];
    if (search) {
      const q = search.toLowerCase();
      p = p.filter(x => x.name.toLowerCase().includes(q) || x.school.toLowerCase().includes(q) || x.pos.toLowerCase().includes(q));
    }
    if (posFilter.length) p = p.filter(x => posFilter.includes(x.pos));
    if (flairFilter) {
      if (["available","committed","signed","drafted"].includes(flairFilter)) { p = p.filter(x => x.status===flairFilter); }
      else { p = p.filter(x => x.flag===flairFilter); }
    }
    if (confFilter.length) p = p.filter(x => confFilter.includes(x.conf));
    if (minGem > 0) p = p.filter(x => x.gemScore >= minGem);
    if (maxRisk < 100) p = p.filter(x => x.riskScore <= maxRisk);
    if (ageFilter.length) p = p.filter(x => ageFilter.includes(x.age));
    p.sort((a, b) => {
      let va, vb;
      const bothPitchers = a.isPitcher && b.isPitcher;
      const eraCol = (sortCol==="stat"||sortCol==="projStat") && bothPitchers;
      if (sortCol==="stat") { va=getMainStat(a)??999; vb=getMainStat(b)??999; }
      else if (sortCol==="projStat") { const pa=projectToConf(a,targetConf),pb=projectToConf(b,targetConf); va=(a.isPitcher?pa.era??999:pa.ops??-99); vb=(b.isPitcher?pb.era??999:pb.ops??-99); }
      else if (sortCol==="probs_d1") { const pa=computeProbs(a),pb=computeProbs(b); va=(a.isPitcher?pa.d1IP:pa.d1PA)??0; vb=(b.isPitcher?pb.d1IP:pb.d1PA)??0; }
      else if (sortCol==="name") { return sortDir==="asc"?a.name.localeCompare(b.name):b.name.localeCompare(a.name); }
      else if (sortCol==="riskScore") { va=a.riskScore??99; vb=b.riskScore??99; }
      else { va=a[sortCol]??-99; vb=b[sortCol]??-99; }
      const eraInvert = eraCol ? -1 : 1;
      return (va-vb) * (sortDir==="desc"?-1:1) * eraInvert;
    });
    return p;
  }, [players, search, posFilter, flairFilter, sortCol, sortDir, targetConf, confFilter, minGem, maxRisk, ageFilter]);

  const SEED_CONFS = ["ACCAC","NJCAA R14","GCAC","MCCAA","NJCAA R1","CCCAA","NJCAA R6"];

  const calcResult = useMemo(() => {
    const src = CONF_SOURCE[calcJucoConf] || {rating:0.85};
    const tgt = CONF_TARGETS[calcTargetConf];
    if (!tgt || !calcJucoOps) return null;
    const ops = parseFloat(calcJucoOps);
    if (isNaN(ops)) return null;
    const norm = ops * src.rating;
    let reg = norm > 0.900 ? 0.88-(norm-0.900)*0.12 : norm>0.780 ? 0.91 : 0.94;
    const proj = Math.round(norm*reg*tgt.opsMult/0.828*1000)/1000;
    const floor = Math.round((proj-0.062)*1000)/1000;
    const ceil  = Math.round((proj+0.068)*1000)/1000;
    const discount = Math.round((1-proj/ops)*100*10)/10;
    return {proj, floor, ceil, discount};
  }, [calcJucoConf, calcJucoOps, calcTargetConf]);

  const maxOpsMult = Math.max(...Object.values(CONF_TARGETS).map(c => c.opsMult));

          <button onClick={() => setSelected(null)} style={{background:"none",border:"none",color:"#4a5568",cursor:"pointer",fontSize:16,padding:"4px 8px",flexShrink:0}}>✕</button>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1,color:"#f6ad55",flexShrink:0}}>{selPlayer.name.toUpperCase()}</span>
          <span style={{fontSize:11,color:"#4a5568",flexShrink:0}}>{selPlayer.pos} · {selPlayer.conf}</span>
          {selPlayer.dest && <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><SchoolLogo dest={selPlayer.dest} size={14}/><span style={{fontSize:11,fontWeight:600,color:"#4ade80"}}>→ {selPlayer.dest}</span></div>}
          <div style={{width:1,height:18,background:"rgba(255,255,255,.08)",flexShrink:0}}/>
          {(() => {
            const proj=projectToConf(selPlayer,targetConf); const ms=getMainStat(selPlayer); const ps=selPlayer.isPitcher?proj.era:proj.ops;
            return <>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>JUCO: <span style={{color:"#f6ad55"}}>{ms!=null?(selPlayer.isPitcher?fmt2(ms):fmt3(ms)):"—"}</span></span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>Proj: <span style={{color:"#93c5fd"}}>{ps!=null?(selPlayer.isPitcher?fmt2(ps):fmt3(ps)):"—"}</span></span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>Gem: <span style={{color:gemColor(selPlayer.gemScore),fontWeight:600}}>{selPlayer.gemScore}</span></span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#94a3b8",flexShrink:0}}>Risk: <span style={{color:riskColor(selPlayer.riskScore)}}>{selPlayer.riskScore} {riskLabel(selPlayer.riskScore)}</span></span>
            </>;
          })()}
          <div style={{marginLeft:"auto",flexShrink:0}}/>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          <PlayerDetail player={selPlayer} targetConf={targetConf} onClose={() => setSelected(null)}
            watched={inPipeline(selPlayer.id)} onWatch={id => inPipeline(id)?removeFromPipeline(id):addToPipeline(id)}
            notes={notes} onNote={onNote} comps={comps} asDrawer={true}/>
        </div>
      </div>}

    </main>

    {isMobile && <nav style={{position:"fixed",bottom:0,left:0,right:0,height:52,background:"#0a0f1a",borderTop:"1px solid rgba(255,255,255,.08)",display:"flex",zIndex:30}}>
      {[["board","📋","Board"],["pipeline","⭐","Pipeline"],["conferences","🏛","Confs"],["help","?","Help"]].map(([v,icon,lbl]) => (
        <button key={v} onClick={() => v==="help"?setHelpOpen(true):setView(v)}
          style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,color:(view===v&&v!=="help")?"#f6ad55":"#4a5568",fontFamily:"'DM Sans',sans-serif"}}>
          <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
          <span style={{fontSize:9,fontWeight:600,letterSpacing:".04em"}}>{lbl.toUpperCase()}</span>
        </button>
      ))}
    </nav>}

    <MobileFilterSheet/>
    {helpOpen && <HelpModal onClose={() => setHelpOpen(false)}/>}

    {cmdOpen && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"80px 20px"}} onClick={e=>e.target===e.currentTarget&&setCmdOpen(false)}>
      <div style={{background:"#0f1623",border:"1px solid rgba(255,255,255,.1)",borderRadius:12,width:"100%",maxWidth:520,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          <input autoFocus value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Search players..." onKeyDown={e=>e.key==="Escape"&&setCmdOpen(false)}
            style={{flex:1,background:"none",border:"none",color:"#e2e8f0",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
          <kbd style={{fontSize:11,color:"#4a5568",border:"1px solid rgba(255,255,255,.1)",borderRadius:4,padding:"2px 6px",fontFamily:"'DM Mono',monospace"}}>ESC</kbd>
        </div>
        {cmdQ.trim()===""
          ? <p style={{padding:"20px 16px",fontSize:13,color:"#4a5568",margin:0}}>Type to search {players.length} players...</p>
          : cmdResults.length===0
            ? <p style={{padding:"20px 16px",fontSize:13,color:"#4a5568",margin:0}}>No results.</p>
            : cmdResults.map(p => (
                <div key={p.id} onClick={()=>{setSelected(p.id);setView("board");setCmdOpen(false);setCmdQ("");}}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                  <Avatar name={p.name} size={28}/>
                  <div style={{flex:1}}><div style={{fontSize:13,color:"#e2e8f0"}}>{p.name}</div><div style={{fontSize:11,color:"#4a5568"}}>{p.pos} · {p.school}</div></div>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,padding:"2px 8px",borderRadius:3,background:"rgba(255,255,255,.05)",color:gemColor(p.gemScore)}}>{p.gemScore}</span>
                  <Badge text={p.status} type="status"/>
                </div>
              ))
        }
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
